<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMO Hub - Gatekeeper Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Base Architecture Variables */
        html[data-theme="dark"] body { background: #0f172a; color: #cbd5e1; }
        html[data-theme="light"] body { background: #f8fafc; color: #0f172a; }

        /* Tech Glassmorphism Matrix Styling */
        html[data-theme="dark"] .login-card { 
            background: rgba(15, 23, 42, 0.65); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        html[data-theme="light"] .login-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(20px);
            border: 1px solid #e2e8f0; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.12); 
        }

        /* Abstract Medical Grid Background Line Patterns */
        .medical-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(59, 130, 246, 0.04) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(59, 130, 246, 0.04) 1px, transparent 1px);
        }
        html[data-theme="light"] .medical-grid {
            background-image: linear-gradient(to right, rgba(59, 130, 246, 0.02) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(59, 130, 246, 0.02) 1px, transparent 1px);
        }

        /* --- IMMERSIVE BACKGROUND HEART MONITOR LAYER --- */
        .bg-monitor-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        .ecg-line {
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            animation: ecg-sweep 4s linear infinite;
        }

        @keyframes ecg-sweep {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* High-Intensity Hyper Glow Matrix Filters */
        html[data-theme="dark"] .ecg-line {
            stroke: #22c55e; 
            filter: drop-shadow(0px 0px 8px rgba(34, 197, 94, 1)) 
                    drop-shadow(0px 0px 18px rgba(34, 197, 94, 0.7))
                    drop-shadow(0px 0px 35px rgba(34, 197, 94, 0.4));
        }
        html[data-theme="light"] .ecg-line {
            stroke: #ef4444; 
            filter: drop-shadow(0px 0px 6px rgba(239, 68, 68, 0.9)) 
                    drop-shadow(0px 0px 15px rgba(239, 68, 68, 0.6))
                    drop-shadow(0px 0px 30px rgba(239, 68, 68, 0.3));
        }

        @keyframes float-slow {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }
        .animated-card-node {
            animation: float-slow 5s ease-in-out infinite;
        }
    </style>
</head>
<body class="medical-grid min-h-screen flex items-center justify-center p-4 relative overflow-hidden transition-colors duration-300">

    <button onclick="toggleTheme()" class="fixed top-4 right-4 p-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/85 hover:bg-slate-100 dark:hover:bg-slate-800/80 transition text-xs font-bold text-slate-700 dark:text-slate-300 z-50 shadow-sm backdrop-blur" id="themeToggleBtn">
        🌙 Dark Mode
    </button>

    <div class="absolute w-[500px] h-[500px] rounded-full bg-blue-500/10 blur-[130px] top-[-10%] left-[-10%] pointer-events-none z-0"></div>
    <div class="absolute w-[450px] h-[450px] rounded-full bg-emerald-500/10 blur-[110px] bottom-[-5%] right-[-5%] pointer-events-none z-0"></div>

    <div class="bg-monitor-container flex items-center">
        <svg class="w-full opacity-30 dark:opacity-25 h-64" viewBox="0 0 1000 100" preserveAspectRatio="none">
            <path class="ecg-line" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"
                  d="M 0 50 L 250 50 L 270 50 L 285 20 L 300 80 L 315 5 L 330 65 L 345 50 L 365 50 L 650 50 L 670 50 L 685 20 L 700 80 L 715 5 L 730 65 L 745 50 L 765 50 L 1000 50" />
        </svg>
    </div>

    <div class="w-full max-w-md relative z-10 animated-card-node">
        
        <div class="login-card rounded-3xl p-8 shadow-2xl">
            
            <div class="text-center mb-6 mt-2 flex flex-col items-center">
                
                <div class="w-full overflow-hidden rounded-2xl border border-slate-200/40 dark:border-slate-800/60 mb-4 bg-white">
                    <img src="https://i.imgur.com/W4iMgls.jpeg" alt="Company Logo" class="w-full h-auto object-cover block">
                </div>

                <h1 class="text-xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-emerald-500 dark:from-blue-400 dark:to-emerald-400 tracking-tight uppercase">HMO HUB GATEWAY</h1>
                <p class="text-slate-400 dark:text-slate-400 text-[11px] mt-1 font-medium tracking-wide">Multi-Patient Utilization Monitoring Environment</p>
            </div>

            <form id="authGatewayForm" onsubmit="executeGatewayLogin(event)" class="space-y-5">
                <div>
                    <label class="block text-[10px] text-slate-500 dark:text-slate-400 uppercase font-black tracking-widest ml-1 mb-1.5">Corporate Username / Email</label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm">👤</span>
                        <input type="email" id="gateway_user" required placeholder="name@hospital.com" 
                               class="w-full bg-white dark:bg-slate-900/90 border border-slate-200 dark:border-slate-800 text-slate-900 dark:text-slate-100 rounded-xl p-3 pl-10 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30 transition font-medium">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] text-slate-500 dark:text-slate-400 uppercase font-black tracking-widest ml-1 mb-1.5">Secure Password</label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm">🔒</span>
                        <input type="password" id="gateway_pass" required placeholder="••••••••" 
                               class="w-full bg-white dark:bg-slate-900/90 border border-slate-200 dark:border-slate-800 text-slate-900 dark:text-slate-100 rounded-xl p-3 pl-10 pr-10 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30 transition font-mono">
                        
                        <button type="button" onclick="togglePasswordInputVisibility()" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-500 transition focus:outline-none text-sm" id="eyeToggleIcon">
                            👁️
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between pt-1">
                    <div class="flex items-center">
                        <input id="remember_me" type="checkbox" class="h-4 w-4 rounded border-slate-300 dark:border-slate-800 text-blue-600 focus:ring-blue-500/20 bg-transparent">
                        <label for="remember_me" class="ml-2 text-xs text-slate-500 dark:text-slate-300 font-medium select-none">Remember terminal station</label>
                    </div>
                    <a href="#" onclick="alert('Please coordinate with your MIS / HMO Accounts Department for password recovery steps.')" class="text-xs font-semibold text-blue-500 dark:text-blue-400 hover:underline">Forgot?</a>
                </div>

                <button type="submit" id="loginBtn" class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-blue-500/10 hover:shadow-blue-500/20 transition-all duration-150 text-xs tracking-widest uppercase mt-2">
                    AUTHENTICATE STATION ACCESS
                </button>
            </form>

            <div class="mt-8 pt-5 border-t border-slate-200 dark:border-slate-800/80 text-center">
                <span class="text-[9px] font-black uppercase tracking-widest bg-slate-100 dark:bg-slate-900 text-slate-400 dark:text-slate-400 px-2.5 py-1 rounded-md">
                    🔒 HIPAA SECURE INFRASTRUCTURE
                </span>
                <p class="text-[10px] text-slate-400 dark:text-slate-500 mt-2.5 px-4 font-medium leading-relaxed">Authorized Medical Operations Personnel Only. All session tracking streams are tracked and audited contextually.</p>
            </div>

        </div>
    </div>

    <script>
        // --- SUPABASE ARCHITECTURE INITIALIZATION ---
        const SUPABASE_URL = "https://zqnqkxpseeuyovtqezbc.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxbnFreHBzZWV1eW92dHFlemJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTYyOTEsImV4cCI6MjA5MjM3MjI5MX0.uR9TcF4_J58cx7XsKx4BbAQcIeYBElgJpKglbMEyHQs";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- GLOBAL THEME SYSTEM ---
        function toggleTheme() {
            const root = document.documentElement;
            const btn = document.getElementById('themeToggleBtn');
            const currentTheme = root.getAttribute('data-theme');
            
            if (currentTheme === 'dark') {
                root.setAttribute('data-theme', 'light');
                btn.innerHTML = '☀️ Light Mode';
            } else {
                root.setAttribute('data-theme', 'dark');
                btn.innerHTML = '🌙 Dark Mode';
            }
        }

        // --- PASSWORD VISIBILITY INTERFACE TOGGLES ---
        function togglePasswordInputVisibility() {
            const passInput = document.getElementById('gateway_pass');
            const eyeIcon = document.getElementById('eyeToggleIcon');
            
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.innerHTML = '🙈';
            } else {
                passInput.type = 'password';
                eyeIcon.innerHTML = '👁️';
            }
        }

        // --- NATIVE SUPABASE AUTH CHECKPOINT ---
        async function executeGatewayLogin(event) {
            event.preventDefault();
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('gateway_user').value.trim();
            const password = document.getElementById('gateway_pass').value;
            
            btn.innerText = "AUTHENTICATING MATRIX...";
            btn.disabled = true;

            try {
                const { data, error } = await _supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    alert(`🚨 Station Authentication Failure: ${error.message}`);
                    btn.innerText = "AUTHENTICATE STATION ACCESS";
                    btn.disabled = false;
                } else if (data.user) {
                    btn.innerText = "ACCESS GRANTED. INITIALIZING DESKTOP...";
                    setTimeout(() => {
                        window.location.href = "entryform.html";
                    }, 800);
                }
            } catch (err) {
                alert(`System Error: ${err.message}`);
                btn.innerText = "AUTHENTICATE STATION ACCESS";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
