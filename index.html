<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMO Hub - Gatekeeper Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Base Architecture Variables */
        html[data-theme="dark"] body { background: #0f172a; color: #cbd5e1; }
        html[data-theme="light"] body { background: #f8fafc; color: #0f172a; }

        /* Tech Glassmorphism Matrix Styling */
        html[data-theme="dark"] .login-card { 
            background: rgba(30, 41, 59, 0.45); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        html[data-theme="light"] .login-card { 
            background: #ffffff; 
            border: 1px solid #e2e8f0; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); 
        }

        /* Abstract Medical Grid Background Line Patterns */
        .medical-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
        }
        html[data-theme="light"] .medical-grid {
            background-image: linear-gradient(to right, rgba(59, 130, 246, 0.02) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(59, 130, 246, 0.02) 1px, transparent 1px);
        }

        /* Interactive Floating Animation Keyframes */
        @keyframes float-slow {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-10px) scale(1.02); }
        }
        .animated-pulse-node {
            animation: float-slow 6s ease-in-out infinite;
        }
    </style>
</head>
<body class="medical-grid min-h-screen flex items-center justify-center p-4 relative overflow-hidden transition-colors duration-300">

    <div class="absolute w-[400px] h-[400px] rounded-full bg-blue-500/10 blur-[120px] top-[-10%] left-[-10%] pointer-events-none"></div>
    <div class="absolute w-[350px] h-[350px] rounded-full bg-emerald-500/10 blur-[100px] bottom-[-5%] right-[-5%] pointer-events-none"></div>

    <div class="w-full max-w-md relative z-10 animated-pulse-node">
        
        <div class="login-card rounded-3xl p-8 shadow-2xl relative">
            
            <button onclick="toggleTheme()" class="absolute top-6 right-6 p-2 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-800/60 transition text-xs font-bold text-slate-700 dark:text-slate-300" id="themeToggleBtn">
                🌙 Dark Mode
            </button>

            <div class="text-center mb-8 mt-4">
                <div class="inline-flex items-center justify-center p-3.5 bg-gradient-to-br from-blue-600 to-emerald-500 rounded-2xl shadow-lg shadow-blue-500/20 mb-4">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-emerald-500 dark:from-blue-400 dark:to-emerald-400 tracking-tight">HMO HUB GATEWAY</h1>
                <p class="text-slate-400 dark:text-slate-400 text-xs mt-1 font-medium tracking-wide">Multi-Patient Utilization Monitoring Environment</p>
            </div>

            <form id="authGatewayForm" onsubmit="executeGatewayLogin(event)" class="space-y-5">
                <div>
                    <label class="block text-[10px] text-slate-500 dark:text-slate-400 uppercase font-black tracking-widest ml-1 mb-1.5">Corporate Username / Email</label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm">👤</span>
                        <input type="text" id="gateway_user" required placeholder="name@hospital.com" 
                               class="w-full bg-white dark:bg-slate-900/90 border border-slate-200 dark:border-slate-800 text-slate-900 dark:text-slate-100 rounded-xl p-3 pl-10 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30 transition font-medium">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] text-slate-500 dark:text-slate-400 uppercase font-black tracking-widest ml-1 mb-1.5">Secure Password</label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm">🔒</span>
                        <input type="password" id="gateway_pass" required placeholder="••••••••" 
                               class="w-full bg-white dark:bg-slate-900/90 border border-slate-200 dark:border-slate-800 text-slate-900 dark:text-slate-100 rounded-xl p-3 pl-10 pr-10 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30 transition font-mono">
                        
                        <button type="button" onclick="togglePasswordInputVisibility()" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-500 transition focus:outline-none text-sm" id="eyeToggleIcon">
                            👁️
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between pt-1">
                    <div class="flex items-center">
                        <input id="remember_me" type="checkbox" class="h-4 w-4 rounded border-slate-300 dark:border-slate-800 text-blue-600 focus:ring-blue-500/20 bg-transparent">
                        <label for="remember_me" class="ml-2 text-xs text-slate-500 dark:text-slate-300 font-medium select-none">Remember terminal station</label>
                    </div>
                    <a href="#" onclick="alert('Please coordinate with your MIS / HMO Accounts Department for password recovery steps.')" class="text-xs font-semibold text-blue-500 dark:text-blue-400 hover:underline">Forgot?</a>
                </div>

                <button type="submit" id="loginBtn" class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-blue-500/10 hover:shadow-blue-500/20 transition-all duration-150 text-xs tracking-widest uppercase mt-2">
                    AUTHENTICATE STATION ACCESS
                </button>
            </form>

            <div class="mt-8 pt-5 border-t border-slate-200 dark:border-slate-800/80 text-center">
                <span class="text-[9px] font-black uppercase tracking-widest bg-slate-100 dark:bg-slate-900 text-slate-400 dark:text-slate-400 px-2.5 py-1 rounded-md">
                    🔒 HIPPA SECURE INFRASTRUCTURE
                </span>
                <p class="text-[10px] text-slate-400 dark:text-slate-500 mt-2.5 px-4 font-medium leading-relaxed">Authorized Medical Operations Personnel Only. All session tracking streams are tracked and audited contextually.</p>
            </div>

        </div>
    </div>

    <script>
        // --- GLOBAL THEME SYSTEM ---
        function toggleTheme() {
            const root = document.documentElement;
            const btn = document.getElementById('themeToggleBtn');
            const currentTheme = root.getAttribute('data-theme');
            
            if (currentTheme === 'dark') {
                root.setAttribute('data-theme', 'light');
                btn.innerHTML = '☀️ Light Mode';
            } else {
                root.setAttribute('data-theme', 'dark');
                btn.innerHTML = '🌙 Dark Mode';
            }
        }

        // --- PASSWORD VISIBILITY INTERFACE TOGGLES ---
        function togglePasswordInputVisibility() {
            const passInput = document.getElementById('gateway_pass');
            const eyeIcon = document.getElementById('eyeToggleIcon');
            
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.innerHTML = '🙈';
            } else {
                passInput.type = 'password';
                eyeIcon.innerHTML = '👁️';
            }
        }

        // --- SECURE PIPELINE SUBMISSION INTERACTION ---
        function executeGatewayLogin(event) {
            event.preventDefault();
            const btn = document.getElementById('loginBtn');
            
            btn.innerText = "VALIDATING CREDENTIAL MATRIX...";
            btn.disabled = true;

            // Simulating authentication checkpoint verification handshake before passing routing rules
            setTimeout(() => {
                // Route forward directly to production transaction dashboard file
                window.location.href = "entryform.html";
            }, 1000);
        }
    </script>
</body>
</html>
