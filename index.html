<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMO Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Base Themes Architecture */
        html[data-theme="dark"] body { background: #0f172a; color: #f1f5f9; }
        html[data-theme="light"] body { background: #f8fafc; color: #0f172a; }

        /* Glass Cards Translation mapping matrix */
        html[data-theme="dark"] .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        html[data-theme="light"] .glass-card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }

        /* Form Interactive Elements Controls */
        html[data-theme="dark"] input, html[data-theme="dark"] select, html[data-theme="dark"] textarea { 
            background: rgba(15, 23, 42, 0.8) !important; 
            border: 1px solid rgba(255, 255, 255, 0.2) !important; 
            color: white !important; 
        }
        html[data-theme="light"] input, html[data-theme="light"] select, html[data-theme="light"] textarea { 
            background: #ffffff !important; 
            border: 1px solid #cbd5e1 !important; 
            color: #0f172a !important; 
        }

        /* Form Disabled states optimization */
        html[data-theme="dark"] input:disabled, html[data-theme="dark"] select:disabled, html[data-theme="dark"] textarea:disabled {
            background: rgba(30, 41, 59, 0.4) !important; color: #94a3b8 !important; border: 1px solid rgba(255, 255, 255, 0.05) !important; cursor: not-allowed;
        }
        html[data-theme="light"] input:disabled, html[data-theme="light"] select:disabled, html[data-theme="light"] textarea:disabled {
            background: #f1f5f9 !important; color: #64748b !important; border: 1px solid #e2e8f0 !important; cursor: not-allowed;
        }

        /* Table Components Layer */
        html[data-theme="dark"] .table-container { border-radius: 12px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(15, 23, 42, 0.5); }
        html[data-theme="light"] .table-container { border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; background: #ffffff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }

        html[data-theme="dark"] tr:nth-child(even) { background: rgba(255, 255, 255, 0.02); }
        html[data-theme="light"] tr:nth-child(even) { background: #f8fafc; }

        html[data-theme="dark"] tr.border-b { border-color: #1e293b; }
        html[data-theme="light"] tr.border-b { border-color: #e2e8f0; }

        html[data-theme="dark"] thead { background: #0f172a; color: #64748b; }
        html[data-theme="light"] thead { background: #f1f5f9; color: #475569; }

        /* Shared Static Elements Utility Layout */
        .status-pill { font-size: 10px; font-weight: 900; padding: 2px 10px; border-radius: 9999px; border-width: 1px; text-transform: uppercase; display: inline-block; }
        .dropdown-menu { display: none; max-height: 200px; overflow-y: auto; z-index: 50; }
        .dropdown-menu.show { display: block; }
        
        /* Dropdown Theme Colors Pipeline */
        html[data-theme="dark"] .dropdown-menu { background: #0f172a; border-color: #334155; }
        html[data-theme="light"] .dropdown-menu { background: #ffffff; border-color: #cbd5e1; }

        /* Subtle Context Badges */
        html[data-theme="dark"] .badge-meta { color: #94a3b8; }
        html[data-theme="light"] .badge-meta { color: #475569; }
    </style>
</head>
<body class="p-4 md:p-8 font-sans min-height: 100vh transition-colors duration-200">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-emerald-500 dark:from-blue-400 dark:to-emerald-400">HMO Hub Dashboard</h1>
                <p class="text-slate-500 text-sm">Concurrent Multi-Patient Processing Queue</p>
            </div>
            
            <div class="flex items-center gap-4 self-end sm:self-auto">
                <button onclick="toggleTheme()" class="p-2 rounded-xl border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 transition flex items-center gap-2 text-xs font-bold" id="themeToggleBtn">
                    🌙 Dark Mode
                </button>

                <button onclick="prepareNewCheckIn()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-bold transition flex items-center gap-2">
                    <span id="toggleIcon">+</span> New Check-In
                </button>
            </div>
        </header>

        <div id="formSection" class="hidden mb-12">
            <form id="hmoForm" class="glass-card rounded-2xl p-6 md:p-8 space-y-6 shadow-2xl">
                <input type="hidden" id="edit_row_id" value="">
                
                <div class="flex justify-between items-center border-b border-slate-200 dark:border-slate-800 pb-4">
                    <div>
                        <h2 id="formHeaderTitle" class="text-xl font-semibold text-blue-600 dark:text-blue-400">Initial Patient Check-In</h2>
                        <span id="workspaceModeBadge" class="inline-block mt-1 text-[9px] font-black uppercase tracking-widest bg-blue-500/10 text-blue-600 dark:text-blue-400 px-2 py-0.5 rounded">NEW MODE</span>
                    </div>
                    <div class="text-right">
                        <label class="block text-[10px] uppercase tracking-widest text-slate-400 dark:text-slate-500">Arrival Time</label>
                        <input type="text" id="toa_display" readonly class="bg-transparent border-none text-emerald-600 dark:text-emerald-400 font-mono text-xl p-0 text-right focus:ring-0 w-32 outline-none">
                        <input type="hidden" id="time_of_arrival" name="time_of_arrival">
                    </div>
                </div>

                <div id="portalContextControls" class="hidden flex items-center justify-between p-4 bg-amber-500/10 border border-amber-500/20 rounded-xl">
                    <p class="text-xs text-amber-700 dark:text-amber-300 font-medium">📄 Viewing record summary archive. Unlocking fields requires confirmation step.</p>
                    <button type="button" onclick="unlockWorkspaceFieldsForEditing()" class="px-4 py-1.5 bg-amber-500 hover:bg-amber-400 text-slate-950 font-black text-[10px] uppercase tracking-wider rounded transition">
                        ⚡ Unlock For Edit/Update
                    </button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="md:col-span-2">
                        <label class="text-[10px] text-slate-400 dark:text-slate-500 ml-1 uppercase font-bold">Patient Name</label>
                        <input type="text" name="patient_name" id="field_patient_name" placeholder="Full Name" required class="w-full rounded-lg p-2.5 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 dark:text-slate-500 ml-1 uppercase font-bold">Card/Company</label>
                        <select name="card_company" id="card_company_select" class="w-full rounded-lg p-2.5 outline-none">
                            <option value="">Loading...</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 dark:text-slate-500 ml-1 uppercase font-bold">Patient Type</label>
                        <select name="patient_type" id="field_patient_type" class="w-full rounded-lg p-2.5 outline-none">
                            <option value="Old">Old Patient</option>
                            <option value="New">New Patient</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="text-[10px] text-slate-400 dark:text-slate-500 ml-1 uppercase font-bold">Transaction</label>
                        <select name="transaction_type" id="transaction_type" class="w-full rounded-lg p-2.5 outline-none">
                            <option value="Consult">Consult (5m)</option>
                            <option value="Loa">LOA (30m)</option>
                            <option value="Procedure">Procedure (30m)</option>
                        </select>
                    </div>
                    <div class="relative">
                        <label class="text-[10px] text-slate-400 dark:text-slate-500 ml-1 uppercase font-bold">Doctor List</label>
                        <div class="relative flex items-center">
                            <input type="text" id="doctor_input" placeholder="Search doctor..." class="w-full rounded-lg p-2.5 pr-8 outline-none" autocomplete="off">
                            <button type="button" id="clear_doctor_btn" class="hidden absolute right-2.5 text-slate-400 hover:text-red-500 text-lg">&times;</button>
                        </div>
                        <input type="hidden" name="doctor_procedure" id="doctor_hidden_value">
                        <div id="doctor_dropdown" class="dropdown-menu absolute left-0 right-0 mt-1 border rounded-lg shadow-xl max-h-60 overflow-y-auto"></div>
                    </div>
                    <div id="service_field_container" class="md:col-span-1">
                        <label class="text-[10px] text-slate-400 dark:text-slate-500 ml-1 uppercase font-bold">Service</label>
                        <input type="text" name="service" id="service_field" placeholder="e.g. X-Ray, Lab" class="w-full rounded-lg p-2.5 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 dark:text-slate-500 ml-1 uppercase font-bold">Amount</label>
                        <input type="number" step="0.01" name="amount" id="amount_field" placeholder="0.00" class="w-full rounded-lg p-2.5 outline-none">
                    </div>
                </div>

                <div id="selected_services_container" class="hidden flex flex-wrap gap-2 p-3 bg-slate-100 dark:bg-slate-950/40 border border-slate-200 dark:border-slate-800 rounded-xl"></div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-slate-400 dark:text-slate-500 ml-1 uppercase font-bold">Associate Name</label>
                        <input type="text" name="name_of_associate" id="field_name_of_associate" placeholder="Who checked in this patient?" class="w-full rounded-lg p-2.5 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 dark:text-slate-500 ml-1 uppercase font-bold text-blue-600 dark:text-blue-400">HMO Verification Status</label>
                        <select name="status" id="field_status" class="w-full rounded-lg p-2.5 font-bold outline-none">
                            <option value="On Process" class="text-amber-500">On Process</option>
                            <option value="Approved" class="text-emerald-500">Approved</option>
                            <option value="Disapproved" class="text-red-500">Disapproved</option>
                            <option value="Cancel" class="text-slate-500">Cancel</option>
                        </select>
                    </div>
                </div>

                <div id="updateFieldsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4 border border-dashed border-slate-300 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-950/30">
                    <div>
                        <label class="text-[10px] text-slate-500 ml-1 uppercase font-bold tracking-wider">HMO Verification Code</label>
                        <input type="text" name="approval_code" id="field_approval_code" placeholder="Required for Approved" class="w-full rounded-lg p-2.5 font-mono uppercase outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 ml-1 uppercase font-bold tracking-wider">HMO Agent Name</label>
                        <input type="text" name="agent_name" id="field_agent_name" placeholder="Required for Approved" class="w-full rounded-lg p-2.5 outline-none">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] text-slate-400 dark:text-slate-500 ml-1 uppercase font-bold tracking-wider">Remarks / Notes (Optional)</label>
                    <textarea name="remarks" id="field_remarks" rows="2" placeholder="Enter processing notes or cancellation reason here..." class="w-full rounded-lg p-2.5 text-sm resize-none outline-none"></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg transition tracking-wide uppercase">
                    INITIALIZE CALL & QUEUE PATIENT
                </button>
            </form>
        </div>

        <div class="mb-5 relative max-w-md">
            <input type="text" id="patientSearchInput" oninput="filterTableBySearch()" placeholder="🔍 Search patient by name..." class="w-full rounded-xl p-3 pl-10 text-sm bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 focus:outline-none focus:border-blue-500 text-slate-900 dark:text-white shadow-sm">
        </div>

        <div class="table-container backdrop-blur-sm">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="text-[10px] uppercase tracking-widest text-slate-500 dark:text-slate-400">
                        <tr>
                            <th class="p-4">Patient</th>
                            <th class="p-4">Transaction / Service Details</th>
                            <th class="p-4">HMO Status</th>
                            <th class="p-4">Arrival</th>
                            <th class="p-4">Call Logs</th>
                            <th class="p-4">TAT Status</th>
                            <th class="p-4">Associate</th>
                            <th class="p-4 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody" class="text-xs text-slate-700 dark:text-slate-200"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://zqnqkxpseeuyovtqezbc.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxbnFreHBzZWV1eW92dHFlemJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTYyOTEsImV4cCI6MjA5MjM3MjI5MX0.uR9TcF4_J58cx7XsKx4BbAQcIeYBElgJpKglbMEyHQs";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let cachedItems = [];
        let cachedDoctors = [];
        let selectedServices = [];
        let currentRecordDataset = []; 
        let isEditMode = false; 

        // --- THEME SWITCH ENGINE ---
        function toggleTheme() {
            const root = document.documentElement;
            const btn = document.getElementById('themeToggleBtn');
            const currentTheme = root.getAttribute('data-theme');
            
            if (currentTheme === 'dark') {
                root.setAttribute('data-theme', 'light');
                btn.innerHTML = '☀️ Light Mode';
            } else {
                root.setAttribute('data-theme', 'dark');
                btn.innerHTML = '🌙 Dark Mode';
            }
        }

        // --- DATA LOADERS ---
        async function loadGuarantors() {
            const select = document.getElementById('card_company_select');
            const { data, error } = await _supabase.from('hmo').select('guarantors').order('guarantors', { ascending: true });
            if (!error && data) {
                const unique = [...new Set(data.map(i => i.guarantors))].filter(Boolean);
                select.innerHTML = `<option value="">-- SELECT COMPANY --</option><option value="CASH">CASH</option>` + 
                                  unique.map(g => `<option value="${g}">${g}</option>`).join('');
            }
        }

        async function loadDoctors(from = 0) {
            const limit = 1000;
            const { data, error } = await _supabase.from('doctorlist').select('name, specialization').order('name', { ascending: true }).range(from, from + limit - 1);
            if (!error && data) {
                cachedDoctors = [...cachedDoctors, ...data];
                if (data.length === limit) await loadDoctors(from + limit);
            }
        }

        async function loadItems(from = 0) {
            const limit = 1000;
            const { data, error } = await _supabase.from('items').select('item_name, price').order('item_name', { ascending: true }).range(from, from + limit - 1);
            if (!error && data) {
                cachedItems = [...cachedItems, ...data];
                if (data.length === limit) await loadItems(from + limit);
            }
        }

        // --- DOCTOR INTERACTION ---
        const docInput = document.getElementById('doctor_input');
        const docHidden = document.getElementById('doctor_hidden_value');
        const docDropdown = document.getElementById('doctor_dropdown');
        const clearDocBtn = document.getElementById('clear_doctor_btn');

        function filterDoctors(searchVal) {
            if (!searchVal) { docDropdown.classList.remove('show'); return; }
            const matches = cachedDoctors.filter(d => d.name.toLowerCase().includes(searchVal.toLowerCase()));
            docDropdown.innerHTML = matches.map(d => `
                <div class="p-2.5 hover:bg-blue-600/30 cursor-pointer text-xs" onclick="selectDoctor('${d.name}', '${d.specialization}')">
                    <span class="font-bold text-slate-900 dark:text-white">${d.name}</span> <span class="text-slate-500 dark:text-slate-400 block text-[10px] uppercase">${d.specialization}</span>
                </div>
            `).join('');
            docDropdown.classList.add('show');
        }

        function selectDoctor(name, spec) {
            const formatted = `${name} (${spec})`;
            docInput.value = formatted; docHidden.value = formatted;
            docInput.disabled = true; clearDocBtn.classList.remove('hidden');
            docDropdown.classList.remove('show');
        }

        clearDocBtn.addEventListener('click', () => {
            docInput.value = ""; docHidden.value = "";
            docInput.disabled = false; clearDocBtn.classList.add('hidden'); docInput.focus();
        });
        docInput.addEventListener('input', (e) => filterDoctors(e.target.value));

        // --- SERVICE LOGIC ---
        const transTypeSelect = document.getElementById('transaction_type');
        const serviceContainer = document.getElementById('service_field_container');
        const badgeContainer = document.getElementById('selected_services_container');
        const amountField = document.getElementById('amount_field');

        function filterServices(searchVal) {
            const drop = document.getElementById('service_smart_dropdown');
            if (!drop || !searchVal) { drop?.classList.remove('show'); return; }
            const matches = cachedItems.filter(i => i.item_name.toLowerCase().includes(searchVal.toLowerCase()));
            drop.innerHTML = matches.map(i => `
                <div class="p-2.5 hover:bg-emerald-600/30 cursor-pointer text-xs flex justify-between items-center" onclick="addServiceToken('${i.item_name}', ${i.price || 0})">
                    <span class="text-slate-900 dark:text-slate-200">${i.item_name}</span> <span class="text-emerald-600 dark:text-emerald-400 font-mono">₱${Number(i.price || 0).toFixed(2)}</span>
                </div>
            `).join('');
            drop.classList.add('show');
        }

        function addServiceToken(name, price) {
            if (selectedServices.some(s => s.name === name)) return;
            selectedServices.push({ name, price });
            renderBadges(); calculateTotalAmount();
            document.getElementById('service_search_input').value = "";
            document.getElementById('service_smart_dropdown').classList.remove('show');
        }

        function removeServiceToken(name) {
            selectedServices = selectedServices.filter(s => s.name !== name);
            renderBadges(); calculateTotalAmount();
        }

        function renderBadges() {
            if (selectedServices.length === 0) { badgeContainer.classList.add('hidden'); return; }
            badgeContainer.classList.remove('hidden');
            badgeContainer.innerHTML = selectedServices.map(s => `
                <span class="inline-flex items-center bg-blue-500/10 border border-blue-500/30 text-blue-700 dark:text-blue-300 text-xs px-2.5 py-1 rounded-lg font-medium">
                    ${s.name} <button type="button" onclick="removeServiceToken('${s.name}')" class="text-red-500 font-bold ml-1">&times;</button>
                </span>
            `).join('');
        }

        function calculateTotalAmount() {
            const sum = selectedServices.reduce((acc, curr) => acc + parseFloat(curr.price || 0), 0);
            amountField.value = sum > 0 ? sum.toFixed(2) : "0.00";
        }

        transTypeSelect.addEventListener('change', (e) => {
            const val = e.target.value; selectedServices = []; renderBadges(); amountField.value = "";
            if (val === 'Loa' || val === 'Procedure') {
                serviceContainer.innerHTML = `
                    <label class="text-[10px] text-slate-400 dark:text-slate-500 ml-1 uppercase font-bold">Service (Smart Array)</label>
                    <input type="text" id="service_search_input" placeholder="Type test..." class="w-full rounded-lg p-2.5 outline-none" autocomplete="off">
                    <div id="service_smart_dropdown" class="dropdown-menu absolute left-0 right-0 mt-1 border rounded-lg shadow-xl max-h-60 overflow-y-auto"></div>
                `;
                document.getElementById('service_search_input').addEventListener('input', (el) => filterServices(el.target.value));
            } else {
                serviceContainer.innerHTML = `
                    <label class="text-[10px] text-slate-400 dark:text-slate-500 ml-1 uppercase font-bold">Service</label>
                    <input type="text" name="service" id="service_field" placeholder="e.g. Consult" class="w-full rounded-lg p-2.5 outline-none">
                `;
            }
        });

        // --- GLOBAL MUTATION CONTROLLERS ---
        function setFormDisabledState(disabled) {
            document.getElementById('field_patient_name').disabled = disabled;
            document.getElementById('card_company_select').disabled = disabled;
            document.getElementById('field_patient_type').disabled = disabled;
            document.getElementById('transaction_type').disabled = disabled;
            document.getElementById('doctor_input').disabled = disabled;
            if (document.getElementById('service_search_input')) document.getElementById('service_search_input').disabled = disabled;
            if (document.getElementById('service_field')) document.getElementById('service_field').disabled = disabled;
            document.getElementById('amount_field').disabled = disabled;
            document.getElementById('field_name_of_associate').disabled = disabled;
            
            document.getElementById('field_status').disabled = disabled;
            document.getElementById('field_approval_code').disabled = disabled;
            document.getElementById('field_agent_name').disabled = disabled;
            document.getElementById('field_remarks').disabled = disabled;
        }

        function prepareNewCheckIn() {
            const formSection = document.getElementById('formSection');
            const targetRowId = document.getElementById('edit_row_id').value;

            if (!formSection.classList.contains('hidden') && !targetRowId) {
                formSection.classList.add('hidden');
                document.getElementById('hmoForm').reset();
                selectedServices = []; 
                renderBadges();
                document.getElementById('toggleIcon').innerText = '+';
                return;
            }

            isEditMode = false;
            document.getElementById('hmoForm').reset();
            document.getElementById('edit_row_id').value = "";
            selectedServices = []; 
            renderBadges();
            
            setFormDisabledState(false);
            
            document.getElementById('field_status').value = "On Process";
            document.getElementById('formHeaderTitle').innerText = "Initial Patient Check-In";
            document.getElementById('workspaceModeBadge').innerText = "NEW MODE";
            document.getElementById('workspaceModeBadge').className = "inline-block mt-1 text-[9px] font-black uppercase tracking-widest bg-blue-500/10 text-blue-600 dark:text-blue-400 px-2 py-0.5 rounded";
            
            document.getElementById('portalContextControls').classList.add('hidden');
            document.getElementById('submitBtn').innerText = "INITIALIZE CALL & QUEUE PATIENT";
            document.getElementById('submitBtn').classList.remove('hidden');
            
            const now = new Date();
            document.getElementById('toa_display').value = now.toLocaleTimeString();
            document.getElementById('time_of_arrival').value = now.toISOString();
            
            formSection.classList.remove('hidden');
            document.getElementById('toggleIcon').innerText = '-';
        }

        function openRowForVerificationUpdate(rowId) {
            const match = currentRecordDataset.find(r => String(r.id) === String(rowId));
            if (!match) return;
            
            isEditMode = false; 
            document.getElementById('hmoForm').reset();
            document.getElementById('edit_row_id').value = match.id;
            
            document.getElementById('field_patient_name').value = match.patient_name || '';
            document.getElementById('card_company_select').value = match.card_company || '';
            document.getElementById('field_patient_type').value = match.patient_type || 'Old';
            document.getElementById('transaction_type').value = match.transaction_type || 'Consult';
            document.getElementById('field_name_of_associate').value = match.name_of_associate || '';
            document.getElementById('amount_field').value = match.amount || '0.00';
            document.getElementById('field_remarks').value = match.remarks || '';
            
            const toaDate = match.time_of_arrival ? new Date(match.time_of_arrival) : new Date();
            document.getElementById('toa_display').value = toaDate.toLocaleTimeString();
            document.getElementById('time_of_arrival').value = match.time_of_arrival || toaDate.toISOString();

            if (Array.isArray(match.service)) {
                selectedServices = match.service.map(s => ({ name: s, price: 0 }));
                renderBadges();
            } else if (match.service) {
                if (document.getElementById('service_field')) document.getElementById('service_field').value = match.service;
            }

            document.getElementById('field_status').value = (match.status === 'On Process' || !match.status) ? "Approved" : match.status; 
            document.getElementById('field_approval_code').value = match.approval_code || '';
            document.getElementById('field_agent_name').value = match.agent_name || '';

            setFormDisabledState(true);
            
            document.getElementById('formHeaderTitle').innerText = `Patient Record: ${match.patient_name}`;
            document.getElementById('workspaceModeBadge').innerText = "VIEW ONLY ARCHIVE";
            document.getElementById('workspaceModeBadge').className = "inline-block mt-1 text-[9px] font-black uppercase tracking-widest bg-slate-500/20 text-slate-500 dark:text-slate-400 px-2 py-0.5 rounded";

            document.getElementById('portalContextControls').classList.remove('hidden');
            document.getElementById('submitBtn').classList.add('hidden');
            
            document.getElementById('formSection').classList.remove('hidden');
            document.getElementById('toggleIcon').innerText = '-';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function unlockWorkspaceFieldsForEditing() {
            isEditMode = true; 
            
            document.getElementById('field_status').disabled = false;
            document.getElementById('field_approval_code').disabled = false;
            document.getElementById('field_agent_name').disabled = false;
            document.getElementById('field_remarks').disabled = false;
            
            document.getElementById('workspaceModeBadge').innerText = "EDIT / UPDATE TRANSACTION ACTIVE";
            document.getElementById('workspaceModeBadge').className = "inline-block mt-1 text-[9px] font-black uppercase tracking-widest bg-amber-500/20 text-amber-600 dark:text-amber-400 px-2 py-0.5 rounded";
            
            document.getElementById('portalContextControls').classList.add('hidden');
            document.getElementById('submitBtn').innerText = "FINALIZE & CLOSE PATIENT TRANSACTION";
            document.getElementById('submitBtn').classList.remove('hidden');
        }

        // --- ADVANCED POST-APPROVAL CANCEL FUNCTION ---
        async function handleDirectCancel(rowId, arrivalTime, transType, existingEndCallTime) {
            const match = currentRecordDataset.find(r => String(r.id) === String(rowId));
            const oldRemarks = match && match.remarks ? match.remarks : '';
            
            const reason = prompt("Enter the reason for cancellation:");
            if (reason === null) return; 

            let optimizedRemarks = oldRemarks;
            if (reason.trim() !== '') {
                optimizedRemarks = oldRemarks ? `${oldRemarks} | CANCEL REASON: ${reason.trim()}` : `CANCEL REASON: ${reason.trim()}`;
            } else if (!oldRemarks) {
                optimizedRemarks = 'Transaction Voided/Cancelled';
            }

            const endCallTime = existingEndCallTime && existingEndCallTime !== 'null' ? new Date(existingEndCallTime) : new Date();
            const arrival = new Date(arrivalTime);
            const diffMins = Math.floor((endCallTime - arrival) / 60000);
            const limit = transType === 'Consult' ? 5 : 30;
            const turnaround_time = diffMins <= limit ? "MET" : "NOT MET";

            const { error } = await _supabase.from('hmo_monitoring').update({
                status: 'Cancel',
                remarks: optimizedRemarks,
                end_time_of_call: endCallTime.toISOString(),
                turnaround_time: turnaround_time
            }).eq('id', rowId);

            if (error) {
                alert("Error cancelling transaction: " + error.message);
            } else {
                fetchRecords();
            }
        }

        function filterTableBySearch() {
            const value = document.getElementById('patientSearchInput').value.toLowerCase().trim();
            if (!value) {
                renderTable(currentRecordDataset);
                return;
            }
            const items = currentRecordDataset.filter(r => r.patient_name && r.patient_name.toLowerCase().includes(value));
            renderTable(items);
        }

        async function fetchRecords() {
            const { data, error } = await _supabase.from('hmo_monitoring').select('*').order('created_at', { ascending: false });
            if (!error) {
                currentRecordDataset = data;
                filterTableBySearch(); 
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = data.map(row => {
                const arrival = row.time_of_arrival ? new Date(row.time_of_arrival) : new Date();
                const dateStr = arrival.toISOString().split('T')[0];
                const start = row.start_time_of_call ? new Date(row.start_time_of_call).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--';
                const end = row.end_time_of_call ? new Date(row.end_time_of_call).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--';
                
                const tatStatus = row.turnaround_time || 'PENDING';
                const tatStyle = tatStatus === 'MET' ? 'text-emerald-600 dark:text-emerald-400 bg-emerald-500/10 border-emerald-500/50' : 
                                 tatStatus === 'NOT MET' ? 'text-red-600 dark:text-red-400 bg-red-500/10 border-red-500/50' : 'text-amber-600 dark:text-amber-400 bg-amber-500/10 border-amber-500/30 animate-pulse';

                const hmoStatus = row.status || 'On Process';
                const statusStyle = hmoStatus === 'Approved' ? 'text-emerald-600 dark:text-emerald-400 bg-emerald-500/10 border-emerald-500/30' :
                                    hmoStatus === 'On Process' ? 'text-amber-600 dark:text-amber-400 bg-amber-500/10 border-amber-500/30 animate-pulse' :
                                    hmoStatus === 'Disapproved' ? 'text-red-600 dark:text-red-400 bg-red-500/10 border-red-500/30' : 
                                    hmoStatus === 'Cancel' ? 'text-slate-500 dark:text-slate-400 bg-slate-500/10 border-slate-500/30' : 'text-slate-500 dark:text-slate-400 bg-slate-500/10 border-slate-500/30';

                let parsedServices = Array.isArray(row.service) ? row.service.join(', ') : (row.service || '');
                const isStillOpen = (!row.end_time_of_call || hmoStatus === 'On Process');

                return `
                    <tr class="border-b transition duration-150">
                        <td class="p-4">
                            <div class="font-bold text-sm text-slate-800 dark:text-slate-100">${row.patient_name || 'No Name'}</div>
                            <div class="text-[10px] text-slate-500 dark:text-slate-400 uppercase font-medium tracking-wide">${row.patient_type || 'Old'} | ${row.card_company || 'CASH'}</div>
                        </td>
                        <td class="p-4">
                            <div class="text-blue-600 dark:text-blue-400 font-bold">${row.transaction_type || 'Consult'}</div>
                            <div class="text-[10px] text-slate-600 dark:text-slate-400 font-mono italic">${row.doctor_procedure || ''} ${parsedServices ? '📂 ('+parsedServices+')' : ''}</div>
                            ${row.amount ? `<div class="text-emerald-600 dark:text-emerald-400 font-extrabold mt-0.5">₱${Number(row.amount).toFixed(2)}</div>` : ''}
                            ${row.remarks ? `<div class="text-slate-700 dark:text-slate-300 bg-slate-100 dark:bg-slate-950/60 border border-slate-200 dark:border-slate-800/80 px-2 py-1 rounded mt-1 max-w-xs truncate text-[11px]">💬 ${row.remarks}</div>` : ''}
                        </td>
                        <td class="p-4">
                            <div class="mb-2"><span class="status-pill border ${statusStyle}">${hmoStatus}</span></div>
                            
                            ${isStillOpen ? `
                                <button onclick="openRowForVerificationUpdate('${row.id}')" class="bg-blue-600 hover:bg-blue-500 text-white text-[11px] font-bold px-3 py-1 rounded border border-blue-400 shadow transition uppercase tracking-wider block relative z-10">
                                    ⚙️ View/Update
                                </button>
                            ` : `
                                <div class="flex flex-col gap-1">
                                    <div class="text-xs font-mono font-bold text-slate-800 dark:text-slate-200 uppercase tracking-wider">${row.approval_code || ''}</div>
                                    <div class="text-[10px] text-slate-500 dark:text-slate-400 italic">${row.agent_name ? 'Agent: ' + row.agent_name : ''}</div>
                                    <button onclick="openRowForVerificationUpdate('${row.id}')" class="text-left text-blue-600 dark:text-blue-400 hover:underline font-semibold text-[10px] tracking-wide uppercase mt-1">
                                        👁️ View Details
                                    </button>
                                </div>
                            `}
                        </td>
                        <td class="p-4 font-mono text-slate-700 dark:text-slate-300">
                            <div class="text-xs font-bold">${dateStr}</div>
                            <div class="text-[10px] text-slate-400 dark:text-slate-500">${arrival.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                        </td>
                        <td class="p-4 font-medium">
                            <div class="text-[10px] text-blue-600 dark:text-blue-400">START: ${start}</div>
                            <div class="text-[10px] text-emerald-600 dark:text-emerald-400">END: ${end}</div>
                        </td>
                        <td class="p-4"><span class="status-pill border ${tatStyle}">${tatStatus}</span></td>
                        <td class="p-4 text-slate-600 dark:text-slate-400 font-mono uppercase text-[10px] font-semibold">${row.name_of_associate || '-'}</td>
                        <td class="p-4 text-center">
                            ${hmoStatus !== 'Cancel' ? `
                                <button onclick="handleDirectCancel('${row.id}', '${row.time_of_arrival}', '${row.transaction_type}', '${row.end_time_of_call}')" class="bg-red-500/10 hover:bg-red-500 hover:text-white border border-red-500/20 text-red-600 dark:text-red-400 text-[11px] font-bold px-2.5 py-1 rounded transition uppercase tracking-wider">
                                    ❌ Cancel
                                </button>
                            ` : `
                                <span class="text-slate-400 dark:text-slate-600 text-[10px] font-bold italic uppercase tracking-wider">Voided</span>
                            `}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // --- SUBMISSION DISPATCH ROUTING ---
        document.getElementById('hmoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const targetRowId = document.getElementById('edit_row_id').value;
            
            const statusField = document.getElementById('field_status').value;
            const approvalCodeField = document.getElementById('field_approval_code').value;
            const agentNameField = document.getElementById('field_agent_name').value;
            const remarksField = document.getElementById('field_remarks').value;

            btn.innerText = "PROCESSING SUBMIT..."; btn.disabled = true;

            if (targetRowId) {
                if (statusField === 'On Process') {
                    alert("⚠️ Action Denied: Please update the HMO Status to Approved, Disapproved, or Cancel to close this patient file.");
                    btn.innerText = "FINALIZE & CLOSE PATIENT TRANSACTION"; btn.disabled = false;
                    return;
                }

                if (statusField === 'Approved') {
                    if (!approvalCodeField.trim() || !agentNameField.trim()) {
                        alert("⚠️ Validation Error: Both 'Approval Code' and 'Agent Name' are required to close an Approved record.");
                        btn.innerText = "FINALIZE & CLOSE PATIENT TRANSACTION"; btn.disabled = false;
                        return;
                    }
                }

                const endCallTime = new Date();
                const arrival = new Date(document.getElementById('time_of_arrival').value);
                const diffMins = Math.floor((endCallTime - arrival) / 60000);
                const limit = document.getElementById('transaction_type').value === 'Consult' ? 5 : 30;
                const turnaround_time = diffMins <= limit ? "MET" : "NOT MET";

                const { error } = await _supabase.from('hmo_monitoring').update({
                    approval_code: approvalCodeField.trim().toUpperCase() || null,
                    status: statusField,
                    agent_name: agentNameField.trim() || null,
                    remarks: remarksField.trim() || null,
                    end_time_of_call: endCallTime.toISOString(),
                    turnaround_time: turnaround_time
                }).eq('id', targetRowId);

                if (error) alert(error.message);
                else {
                    document.getElementById('formSection').classList.add('hidden');
                    document.getElementById('toggleIcon').innerText = '+';
                    fetchRecords();
                }

            } else {
                const formData = new FormData(e.target);
                const entry = Object.fromEntries(formData.entries());
                
                const arrival = new Date(document.getElementById('time_of_arrival').value);
                entry.time_of_arrival = arrival.toISOString();
                entry.start_time_of_call = arrival.toISOString(); 
                entry.end_time_of_call = null;
                entry.turnaround_time = "PENDING";
                entry.amount = entry.amount ? parseFloat(entry.amount) : 0.00;
                entry.status = "On Process"; 
                entry.remarks = entry.remarks.trim() || null;

                if (entry.transaction_type === 'Loa' || entry.transaction_type === 'Procedure') {
                    entry.service = selectedServices.map(s => s.name); 
                } else {
                    const fallbackVal = document.getElementById('service_field')?.value || 'Consultation';
                    entry.service = [fallbackVal]; 
                }

                const { error } = await _supabase.from('hmo_monitoring').insert([entry]);
                if (error) alert(error.message);
                else {
                    document.getElementById('formSection').classList.add('hidden');
                    document.getElementById('toggleIcon').innerText = '+';
                    fetchRecords();
                }
            }
            
            btn.disabled = false;
        });

        _supabase.channel('hmo_realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'hmo_monitoring' }, fetchRecords).subscribe();
        
        loadGuarantors(); loadDoctors(); loadItems(); fetchRecords();
    </script>
</body>
</html>
