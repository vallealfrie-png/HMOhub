<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMO Hub Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input, select, textarea { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.2) !important; color: white !important; }
    </style>
</head>
<body class="p-4 md:p-8 text-white font-sans">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">HMO Hub Monitoring</h1>
                <p class="text-slate-400">Patient Entry & Activity Log</p>
            </div>
            <div class="text-right">
                <label class="block text-xs uppercase tracking-widest text-slate-500 mb-1">Time of Arrival</label>
                <input type="text" id="toa_display" readonly class="bg-transparent border-none text-emerald-400 font-mono text-xl p-0 focus:ring-0 text-right" value="--:--:--">
                <input type="hidden" id="time_of_arrival" name="time_of_arrival">
            </div>
        </header>

        <form id="hmoForm" class="glass-card rounded-2xl p-6 md:p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-300">Patient Name</label>
                    <input type="text" name="patient_name" required class="w-full rounded-lg p-2.5">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-300">Card / Company</label>
                    <input type="text" name="card_company" class="w-full rounded-lg p-2.5">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-300">Transaction Type</label>
                    <select name="transaction_type" class="w-full rounded-lg p-2.5">
                        <option value="Consult">Consult</option>
                        <option value="Loa">LOA</option>
                        <option value="Procedure">Procedure</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-300">Patient Type</label>
                    <select name="patient_type" class="w-full rounded-lg p-2.5">
                        <option value="New">New</option>
                        <option value="Old">Old</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-end border-t border-slate-800 pt-6">
                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-300">Start Call</label>
                    <div class="flex gap-2">
                        <input type="text" id="start_time_display" readonly class="w-full rounded-lg p-2.5 text-slate-400 font-mono" placeholder="--:--:--">
                        <button type="button" id="startBtn" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-lg transition font-bold">START</button>
                    </div>
                    <input type="hidden" id="start_time_of_call" name="start_time_of_call">
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-300">End Call</label>
                    <div class="flex gap-2">
                        <input type="text" id="end_time_display" readonly class="w-full rounded-lg p-2.5 text-slate-400 font-mono" placeholder="--:--:--">
                        <button type="button" id="endBtn" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-2 rounded-lg transition font-bold">END</button>
                    </div>
                    <input type="hidden" id="end_time_of_call" name="end_time_of_call">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <input type="text" name="name_of_associate" placeholder="Associate Name" class="w-full rounded-lg p-2.5">
                <input type="text" name="remarks" placeholder="Remarks" class="w-full rounded-lg p-2.5">
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-500 hover:bg-blue-400 text-white font-bold py-4 rounded-xl shadow-lg transition active:scale-95">
                SUBMIT RECORD
            </button>
        </form>
    </div>

    <script>
        const SUPABASE_URL = "https://zqnqkxpseeuyovtqezbc.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxbnFreHBzZWV1eW92dHFlemJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTYyOTEsImV4cCI6MjA5MjM3MjI5MX0.uR9TcF4_J58cx7XsKx4BbAQcIeYBElgJpKglbMEyHQs";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. SET ARRIVAL TIME ON LOAD
        window.onload = () => {
            const now = new Date();
            document.getElementById('toa_display').value = now.toLocaleTimeString();
            document.getElementById('time_of_arrival').value = now.toISOString();
        };

        // 2. FIXED TIMESTAMP LOGIC
        function captureTime(displayId, hiddenId) {
            const now = new Date();
            document.getElementById(displayId).value = now.toLocaleTimeString();
            document.getElementById(hiddenId).value = now.toISOString();
        }

        document.getElementById('startBtn').addEventListener('click', () => captureTime('start_time_display', 'start_time_of_call'));
        document.getElementById('endBtn').addEventListener('click', () => captureTime('end_time_display', 'end_time_of_call'));

        // 3. SUBMIT
        document.getElementById('hmoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "SAVING...";

            const formData = new FormData(e.target);
            // Append the Arrival Time from the hidden header input
            const data = Object.fromEntries(formData.entries());
            data.time_of_arrival = document.getElementById('time_of_arrival').value;

            const { error } = await supabase.from('hmo_monitoring').insert([data]);

            if (error) {
                alert("Error: " + error.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "SUBMIT RECORD";
            } else {
                alert("Saved!");
                location.reload(); // Refresh to reset arrival time for next patient
            }
        });
    </script>
</body>
</html>
