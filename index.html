<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMO Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; min-height: 100vh; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input, select, textarea { 
            background: rgba(15, 23, 42, 0.8) !important; 
            border: 1px solid rgba(255, 255, 255, 0.2) !important; 
            color: white !important; 
        }
        .table-container { border-radius: 12px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); }
        tr:nth-child(even) { background: rgba(255, 255, 255, 0.02); }
        .status-pill { font-size: 10px; font-weight: 900; padding: 2px 10px; border-radius: 9999px; border-width: 1px; text-transform: uppercase; }
        .dropdown-menu { display: none; max-height: 200px; overflow-y: auto; z-index: 50; }
        .dropdown-menu.show { display: block; }
    </style>
</head>
<body class="p-4 md:p-8 font-sans text-slate-200">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">HMO Hub Dashboard</h1>
                <p class="text-slate-500 text-sm">Concurrent Multi-Patient Processing Queue</p>
            </div>
            <button onclick="toggleForm()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-lg font-bold transition flex items-center gap-2">
                <span id="toggleIcon">+</span> New Check-In
            </button>
        </header>

        <div id="formSection" class="hidden mb-12">
            <form id="hmoForm" class="glass-card rounded-2xl p-6 md:p-8 space-y-6 shadow-2xl">
                <div class="flex justify-between items-center border-b border-slate-800 pb-4">
                    <h2 class="text-xl font-semibold text-blue-400">Initial Patient Check-In</h2>
                    <div class="text-right">
                        <label class="block text-[10px] uppercase tracking-widest text-slate-500">Arrival Time</label>
                        <input type="text" id="toa_display" readonly class="bg-transparent border-none text-emerald-400 font-mono text-xl p-0 text-right focus:ring-0 w-32">
                        <input type="hidden" id="time_of_arrival" name="time_of_arrival">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="md:col-span-2">
                        <label class="text-[10px] text-slate-500 ml-1 uppercase font-bold">Patient Name</label>
                        <input type="text" name="patient_name" placeholder="Full Name" required class="w-full rounded-lg p-2.5">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 ml-1 uppercase font-bold">Card/Company</label>
                        <select name="card_company" id="card_company_select" class="w-full rounded-lg p-2.5">
                            <option value="">Loading...</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 ml-1 uppercase font-bold">Patient Type</label>
                        <select name="patient_type" class="w-full rounded-lg p-2.5">
                            <option value="Old">Old Patient</option>
                            <option value="New">New Patient</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="text-[10px] text-slate-500 ml-1 uppercase font-bold">Transaction</label>
                        <select name="transaction_type" id="transaction_type" class="w-full rounded-lg p-2.5">
                            <option value="Consult">Consult (5m)</option>
                            <option value="Loa">LOA (30m)</option>
                            <option value="Procedure">Procedure (30m)</option>
                        </select>
                    </div>
                    <div class="relative">
                        <label class="text-[10px] text-slate-500 ml-1 uppercase font-bold">Doctor List</label>
                        <div class="relative flex items-center">
                            <input type="text" id="doctor_input" placeholder="Search doctor..." class="w-full rounded-lg p-2.5 pr-8" autocomplete="off">
                            <button type="button" id="clear_doctor_btn" class="hidden absolute right-2.5 text-slate-400 hover:text-red-400 text-lg">&times;</button>
                        </div>
                        <input type="hidden" name="doctor_procedure" id="doctor_hidden_value">
                        <div id="doctor_dropdown" class="dropdown-menu absolute left-0 right-0 mt-1 bg-slate-900 border border-slate-700 rounded-lg shadow-xl max-h-60 overflow-y-auto"></div>
                    </div>
                    <div id="service_field_container" class="md:col-span-1">
                        <label class="text-[10px] text-slate-500 ml-1 uppercase font-bold">Service</label>
                        <input type="text" name="service" id="service_field" placeholder="e.g. X-Ray, Lab" class="w-full rounded-lg p-2.5">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 ml-1 uppercase font-bold">Amount</label>
                        <input type="number" step="0.01" name="amount" id="amount_field" placeholder="0.00" class="w-full rounded-lg p-2.5">
                    </div>
                </div>

                <div id="selected_services_container" class="hidden flex flex-wrap gap-2 p-3 bg-slate-950/40 border border-slate-800 rounded-xl"></div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-slate-500 ml-1 uppercase font-bold">Associate Name</label>
                        <input type="text" name="name_of_associate" placeholder="Who checked in this patient?" class="w-full rounded-lg p-2.5">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 ml-1 uppercase font-bold">HMO Agent Name (Optional Now)</label>
                        <input type="text" name="agent_name" placeholder="Can be updated later" class="w-full rounded-lg p-2.5">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg transition">
                    INITIALIZE CALL & QUEUE PATIENT
                </button>
            </form>
        </div>

        <div class="table-container bg-slate-900/50 backdrop-blur-sm">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="text-[10px] uppercase tracking-widest text-slate-500 bg-slate-900">
                        <tr>
                            <th class="p-4">Patient</th>
                            <th class="p-4">Transaction / Service Details</th>
                            <th class="p-4">HMO Verification & Actions</th>
                            <th class="p-4">Arrival</th>
                            <th class="p-4">Call Logs</th>
                            <th class="p-4">TAT Status</th>
                            <th class="p-4">Associate</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody" class="text-xs"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://zqnqkxpseeuyovtqezbc.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxbnFreHBzZWV1eW92dHFlemJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTYyOTEsImV4cCI6MjA5MjM3MjI5MX0.uR9TcF4_J58cx7XsKx4BbAQcIeYBElgJpKglbMEyHQs";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let cachedItems = [];
        let cachedDoctors = [];
        let selectedServices = [];

        // --- DATA LOADERS ---
        async function loadGuarantors() {
            const select = document.getElementById('card_company_select');
            const { data, error } = await _supabase.from('hmo').select('guarantors').order('guarantors', { ascending: true });
            if (!error && data) {
                const unique = [...new Set(data.map(i => i.guarantors))].filter(Boolean);
                select.innerHTML = `<option value="">-- SELECT COMPANY --</option><option value="CASH">CASH</option>` + 
                                  unique.map(g => `<option value="${g}">${g}</option>`).join('');
            }
        }

        async function loadDoctors(from = 0) {
            const limit = 1000;
            const { data, error } = await _supabase.from('doctorlist').select('name, specialization').order('name', { ascending: true }).range(from, from + limit - 1);
            if (!error && data) {
                cachedDoctors = [...cachedDoctors, ...data];
                if (data.length === limit) await loadDoctors(from + limit);
            }
        }

        async function loadItems(from = 0) {
            const limit = 1000;
            const { data, error } = await _supabase.from('items').select('item_name, price').order('item_name', { ascending: true }).range(from, from + limit - 1);
            if (!error && data) {
                cachedItems = [...cachedItems, ...data];
                if (data.length === limit) await loadItems(from + limit);
            }
        }

        // --- DOCTOR INTERACTION ---
        const docInput = document.getElementById('doctor_input');
        const docHidden = document.getElementById('doctor_hidden_value');
        const docDropdown = document.getElementById('doctor_dropdown');
        const clearDocBtn = document.getElementById('clear_doctor_btn');

        function filterDoctors(searchVal) {
            if (!searchVal) { docDropdown.classList.remove('show'); return; }
            const matches = cachedDoctors.filter(d => d.name.toLowerCase().includes(searchVal.toLowerCase()));
            if (matches.length === 0) {
                docDropdown.innerHTML = `<div class="p-3 text-slate-500 text-xs">No doctors found</div>`;
            } else {
                docDropdown.innerHTML = matches.map(d => `
                    <div class="p-2.5 hover:bg-blue-600/30 cursor-pointer transition text-xs border-b border-slate-800/40" onclick="selectDoctor('${d.name}', '${d.specialization}')">
                        <span class="font-bold text-white">${d.name}</span> <span class="text-slate-400 block text-[10px] uppercase tracking-wider">${d.specialization}</span>
                    </div>
                `).join('');
            }
            docDropdown.classList.add('show');
        }

        function selectDoctor(name, spec) {
            const formatted = `${name} (${spec})`;
            docInput.value = formatted; docHidden.value = formatted;
            docInput.disabled = true; clearDocBtn.classList.remove('hidden');
            docDropdown.classList.remove('show');
        }

        clearDocBtn.addEventListener('click', () => {
            docInput.value = ""; docHidden.value = "";
            docInput.disabled = false; clearDocBtn.classList.add('hidden'); docInput.focus();
        });
        docInput.addEventListener('input', (e) => filterDoctors(e.target.value));

        // --- MULTI-SELECT SERVICE HANDLERS ---
        const transTypeSelect = document.getElementById('transaction_type');
        const serviceContainer = document.getElementById('service_field_container');
        const badgeContainer = document.getElementById('selected_services_container');
        const amountField = document.getElementById('amount_field');

        function filterServices(searchVal) {
            const drop = document.getElementById('service_smart_dropdown');
            if (!drop || !searchVal) { drop?.classList.remove('show'); return; }
            const matches = cachedItems.filter(i => i.item_name.toLowerCase().includes(searchVal.toLowerCase()));
            drop.innerHTML = matches.map(i => `
                <div class="p-2.5 hover:bg-emerald-600/30 cursor-pointer transition text-xs flex justify-between items-center" onclick="addServiceToken('${i.item_name}', ${i.price || 0})">
                    <span class="text-white">${i.item_name}</span> <span class="text-emerald-400 font-mono">₱${Number(i.price || 0).toFixed(2)}</span>
                </div>
            `).join('');
            drop.classList.add('show');
        }

        function addServiceToken(name, price) {
            if (selectedServices.some(s => s.name === name)) return;
            selectedServices.push({ name, price });
            renderBadges(); calculateTotalAmount();
            document.getElementById('service_search_input').value = "";
            document.getElementById('service_smart_dropdown').classList.remove('show');
        }

        function removeServiceToken(name) {
            selectedServices = selectedServices.filter(s => s.name !== name);
            renderBadges(); calculateTotalAmount();
        }

        function renderBadges() {
            if (selectedServices.length === 0) { badgeContainer.classList.add('hidden'); return; }
            badgeContainer.classList.remove('hidden');
            badgeContainer.innerHTML = selectedServices.map(s => `
                <span class="inline-flex items-center bg-blue-500/10 border border-blue-500/30 text-blue-300 text-xs px-2.5 py-1 rounded-lg">
                    ${s.name} <button type="button" onclick="removeServiceToken('${s.name}')" class="text-red-400 font-bold ml-1">&times;</button>
                </span>
            `).join('');
        }

        function calculateTotalAmount() {
            const sum = selectedServices.reduce((acc, curr) => acc + parseFloat(curr.price || 0), 0);
            amountField.value = sum > 0 ? sum.toFixed(2) : "0.00";
        }

        transTypeSelect.addEventListener('change', (e) => {
            const val = e.target.value; selectedServices = []; renderBadges(); amountField.value = "";
            if (val === 'Loa' || val === 'Procedure') {
                serviceContainer.innerHTML = `
                    <label class="text-[10px] text-slate-500 ml-1 uppercase font-bold">Service (Smart Array)</label>
                    <input type="text" id="service_search_input" placeholder="Type test..." class="w-full rounded-lg p-2.5" autocomplete="off">
                    <div id="service_smart_dropdown" class="dropdown-menu absolute left-0 right-0 mt-1 bg-slate-900 border border-slate-700 rounded-lg shadow-xl max-h-60 overflow-y-auto"></div>
                `;
                document.getElementById('service_search_input').addEventListener('input', (el) => filterServices(el.target.value));
            } else {
                serviceContainer.innerHTML = `
                    <label class="text-[10px] text-slate-500 ml-1 uppercase font-bold">Service</label>
                    <input type="text" name="service" id="service_field" placeholder="e.g. Consult" class="w-full rounded-lg p-2.5">
                `;
            }
        });

        // --- QUEUE PROCESS CONTROLLER ---
        function toggleForm() {
            const form = document.getElementById('formSection');
            form.classList.toggle('hidden');
            document.getElementById('toggleIcon').innerText = form.classList.contains('hidden') ? '+' : '-';
            if(!form.classList.contains('hidden')) {
                const now = new Date();
                document.getElementById('toa_display').value = now.toLocaleTimeString();
                document.getElementById('time_of_arrival').value = now.toISOString();
            }
        }

        async function fetchRecords() {
            const { data, error } = await _supabase.from('hmo_monitoring').select('*').order('created_at', { ascending: false });
            if (!error) renderTable(data);
        }

        // PHASE 2 PROCESS CONDITIONAL VALIDATION GUARD
        async function completeRowCall(id, arrivalTime, transactionType) {
            const codeInput = document.getElementById(`inline_code_${id}`).value.trim();
            const statusSelect = document.getElementById(`inline_status_${id}`).value;
            const agentInput = document.getElementById(`inline_agent_${id}`).value.trim();

            // ADJUSTED EXPLICIT VALIDATION: ONLY 'Approved' CLAIMS ARE BLOCKED FOR NULLS
            if (statusSelect === 'Approved') {
                if (!codeInput || !agentInput) {
                    alert("⚠️ Data Validation Error: Both 'Approval Code' and 'Agent Name' fields are required before finalizing an Approved transaction record.");
                    return;
                }
            }

            const endCallTime = new Date();
            const arrival = new Date(arrivalTime);
            
            const diffMins = Math.floor((endCallTime - arrival) / 60000);
            const limit = transactionType === 'Consult' ? 5 : 30;
            const turnaround_time = diffMins <= limit ? "MET" : "NOT MET";

            const { error } = await _supabase.from('hmo_monitoring').update({
                approval_code: codeInput || null,
                status: statusSelect,
                agent_name: agentInput || null,
                end_time_of_call: endCallTime.toISOString(),
                turnaround_time: turnaround_time
            }).eq('id', id);

            if (error) alert(error.message);
            else fetchRecords();
        }

        function renderTable(data) {
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = data.map(row => {
                const arrival = new Date(row.time_of_arrival);
                const dateStr = arrival.toISOString().split('T')[0];
                const start = row.start_time_of_call ? new Date(row.start_time_of_call).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--';
                const end = row.end_time_of_call ? new Date(row.end_time_of_call).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--';
                
                const tatStatus = row.turnaround_time || 'PENDING';
                const tatStyle = tatStatus === 'MET' ? 'text-emerald-400 bg-emerald-400/10 border-emerald-500/50' : 
                                 tatStatus === 'NOT MET' ? 'text-red-400 bg-red-400/10 border-red-500/50' : 'text-amber-400 bg-amber-400/10 border-amber-500/30 animate-pulse';

                let parsedServices = Array.isArray(row.service) ? row.service.join(', ') : (row.service || '');

                let verificationColumnHTML = "";
                if (row.end_time_of_call) {
                    const hmoStatus = row.status || 'Approved';
                    const statusStyle = hmoStatus === 'Approved' ? 'text-emerald-400 bg-emerald-500/10 border-emerald-500/30' :
                                        hmoStatus === 'Disapproved' ? 'text-red-400 bg-red-500/10 border-red-500/30' : 'text-amber-500 bg-amber-500/10 border-amber-500/30';
                    verificationColumnHTML = `
                        <div class="mb-1"><span class="status-pill border ${statusStyle}">${hmoStatus}</span></div>
                        <div class="text-xs font-mono font-bold text-slate-300 uppercase">${row.approval_code || 'NO CODE'}</div>
                        <div class="text-[10px] text-slate-500 italic mt-0.5">${row.agent_name ? 'Agent: ' + row.agent_name : ''}</div>
                    `;
                } else {
                    verificationColumnHTML = `
                        <div class="space-y-1.5 p-1 bg-white/5 border border-white/10 rounded-lg max-w-[220px]">
                            <input type="text" id="inline_code_${row.id}" placeholder="Approval Code" class="w-full text-[11px] p-1 rounded border border-slate-700 font-mono uppercase">
                            <input type="text" id="inline_agent_${row.id}" placeholder="Agent Name" class="w-full text-[11px] p-1 rounded border border-slate-700">
                            <div class="flex gap-1">
                                <select id="inline_status_${row.id}" class="text-[11px] p-1 rounded border border-slate-700 w-1/2 bg-slate-950">
                                    <option value="Approved">Approved</option>
                                    <option value="Disapproved">Disapproved</option>
                                    <option value="Cancel">Cancel</option>
                                </select>
                                <button onclick="completeRowCall(${row.id}, '${row.time_of_arrival}', '${row.transaction_type}')" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-2 py-1 rounded text-[10px] w-1/2 transition">
                                    SAVE & END
                                </button>
                            </div>
                        </div>
                    `;
                }

                return `
                    <tr class="border-b border-slate-800 hover:bg-white/5 transition">
                        <td class="p-4">
                            <div class="font-bold text-sm text-white">${row.patient_name}</div>
                            <div class="text-[10px] text-slate-400 uppercase">${row.patient_type} | ${row.card_company || 'CASH'}</div>
                        </td>
                        <td class="p-4">
                            <div class="text-blue-400 font-semibold">${row.transaction_type}</div>
                            <div class="text-[10px] text-slate-500 font-mono italic">${row.doctor_procedure || ''} ${parsedServices ? '📂 ('+parsedServices+')' : ''}</div>
                            ${row.amount ? `<div class="text-emerald-400 font-bold mt-0.5">₱${Number(row.amount).toFixed(2)}</div>` : ''}
                        </td>
                        <td class="p-4">${verificationColumnHTML}</td>
                        <td class="p-4 font-mono text-slate-300">
                            <div class="text-xs font-bold">${dateStr}</div>
                            <div class="text-[10px] text-slate-500">${arrival.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                        </td>
                        <td class="p-4">
                            <div class="text-[10px] text-blue-400">START: ${start}</div>
                            <div class="text-[10px] text-emerald-400">END: ${end}</div>
                        </td>
                        <td class="p-4"><span class="status-pill border ${tatStyle}">${tatStatus}</span></td>
                        <td class="p-4 text-slate-400 uppercase text-[10px]">${row.name_of_associate || '-'}</td>
                    </tr>
                `;
            }).join('');
        }

        document.getElementById('hmoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "QUEUEING..."; btn.disabled = true;

            const formData = new FormData(e.target);
            const entry = Object.fromEntries(formData.entries());
            const arrival = new Date(document.getElementById('time_of_arrival').value);
            
            entry.time_of_arrival = arrival.toISOString();
            entry.start_time_of_call = arrival.toISOString(); 
            entry.end_time_of_call = null;
            entry.turnaround_time = "PENDING";
            entry.amount = entry.amount ? parseFloat(entry.amount) : 0.00;
            entry.status = "Approved"; 

            if (entry.transaction_type === 'Loa' || entry.transaction_type === 'Procedure') {
                entry.service = selectedServices.map(s => s.name); 
            }

            const { error } = await _supabase.from('hmo_monitoring').insert([entry]);
            if (error) alert(error.message);
            else {
                e.target.reset();
                selectedServices = []; renderBadges();
                docInput.disabled = false; clearDocBtn.classList.add('hidden');
                serviceContainer.innerHTML = `<label class="text-[10px] text-slate-500 ml-1 uppercase font-bold">Service</label><input type="text" name="service" id="service_field" placeholder="e.g. Consult" class="w-full rounded-lg p-2.5">`;
                toggleForm();
                fetchRecords();
            }
            btn.innerText = "INITIALIZE CALL & QUEUE PATIENT"; btn.disabled = false;
        });

        _supabase.channel('hmo_realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'hmo_monitoring' }, fetchRecords).subscribe();
        
        loadGuarantors(); loadDoctors(); loadItems(); fetchRecords();
    </script>
</body>
</html>
