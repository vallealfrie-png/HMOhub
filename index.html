<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMO Hub | Integrated Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #0f172a; min-height: 100vh; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input, select, textarea { 
            background: rgba(15, 23, 42, 0.8) !important; 
            border: 1px solid rgba(255, 255, 255, 0.2) !important; 
            color: white !important; 
        }
        .table-container { border-radius: 12px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); }
        tr:nth-child(even) { background: rgba(255, 255, 255, 0.02); }
        .status-pill { font-size: 10px; font-weight: 900; padding: 2px 10px; border-radius: 9999px; border-width: 1px; text-transform: uppercase; }
        /* Fix for Highcharts height collapse */
        .chart-frame { height: 320px; width: 100%; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 uppercase tracking-tighter">HMO Hub Intelligence</h1>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest" id="db_status">System Online</p>
            </div>
            <button onclick="toggleForm()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-lg font-bold transition flex items-center gap-2">
                <span id="toggleIcon">+</span> Add New Patient
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="glass-card p-4 rounded-2xl">
                <div id="patientDonut" class="chart-frame"></div>
            </div>
            <div class="glass-card p-4 rounded-2xl">
                <div id="slaPie" class="chart-frame"></div>
            </div>
        </div>

        <div id="formSection" class="hidden mb-12">
            <form id="hmoForm" class="glass-card rounded-2xl p-6 md:p-8 space-y-6 shadow-2xl border-blue-500/20">
                <div class="flex justify-between items-center border-b border-slate-800 pb-4">
                    <h2 class="text-xl font-semibold text-blue-400">New Patient Entry</h2>
                    <div class="text-right">
                        <label class="block text-[10px] uppercase tracking-widest text-slate-500">Arrival Time</label>
                        <input type="text" id="toa_display" readonly class="bg-transparent border-none text-emerald-400 font-mono text-xl p-0 text-right focus:ring-0 w-32">
                        <input type="hidden" id="time_of_arrival" name="time_of_arrival">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="md:col-span-2">
                        <label class="text-[10px] text-slate-500 ml-1 uppercase font-bold">Patient Name</label>
                        <input type="text" name="patient_name" placeholder="Full Name" required class="w-full rounded-lg p-2.5">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 ml-1 uppercase font-bold">Card/Company</label>
                        <select name="card_company" id="card_company_select" class="w-full rounded-lg p-2.5">
                            <option value="">Loading Guarantors...</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 ml-1 uppercase font-bold">Patient Type</label>
                        <select name="patient_type" class="w-full rounded-lg p-2.5">
                            <option value="Old">Old Patient</option>
                            <option value="New">New Patient</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="text-[10px] text-slate-500 ml-1 uppercase font-bold">Transaction</label>
                        <select name="transaction_type" id="transaction_type" class="w-full rounded-lg p-2.5">
                            <option value="Consult">Consult (5m)</option>
                            <option value="Loa">LOA (30m)</option>
                            <option value="Procedure">Procedure (30m)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 ml-1 uppercase font-bold">Doctor/Procedure</label>
                        <input type="text" name="doctor_procedure" placeholder="Specific Procedure" class="w-full rounded-lg p-2.5">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 ml-1 uppercase font-bold">Service</label>
                        <input type="text" name="service" placeholder="e.g. X-Ray, Lab" class="w-full rounded-lg p-2.5">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-end border-t border-slate-800 pt-6">
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-300">Start Call</label>
                        <div class="flex gap-2">
                            <input type="text" id="start_time_display" readonly class="w-full rounded-lg p-2.5 font-mono text-blue-400" placeholder="--:--:--">
                            <button type="button" id="startBtn" class="bg-blue-600/20 border border-blue-500 text-blue-400 px-4 py-2 rounded-lg font-bold hover:bg-blue-600 hover:text-white transition">START</button>
                        </div>
                        <input type="hidden" id="start_time_of_call" name="start_time_of_call">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-300">End Call</label>
                        <div class="flex gap-2">
                            <input type="text" id="end_time_display" readonly class="w-full rounded-lg p-2.5 font-mono text-emerald-400" placeholder="--:--:--">
                            <button type="button" id="endBtn" class="bg-emerald-600/20 border border-emerald-500 text-emerald-400 px-4 py-2 rounded-lg font-bold hover:bg-emerald-600 hover:text-white transition">END</button>
                        </div>
                        <input type="hidden" id="end_time_of_call" name="end_time_of_call">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" name="name_of_associate" placeholder="Associate Name" class="w-full rounded-lg p-2.5">
                    <input type="text" name="remarks" placeholder="Remarks..." class="w-full rounded-lg p-2.5">
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg transition">SAVE PATIENT RECORD</button>
            </form>
        </div>

        <div class="table-container bg-slate-900/50 backdrop-blur-sm">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="text-[10px] uppercase tracking-widest text-slate-500 bg-slate-900">
                        <tr>
                            <th class="p-4">Patient</th>
                            <th class="p-4">Transaction</th>
                            <th class="p-4">Arrival</th>
                            <th class="p-4">Call Logs</th>
                            <th class="p-4">SLA Status</th>
                            <th class="p-4">Associate</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody" class="text-xs"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://zqnqkxpseeuyovtqezbc.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxbnFreHBzZWV1eW92dHFlemJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTYyOTEsImV4cCI6MjA5MjM3MjI5MX0.uR9TcF4_J58cx7XsKx4BbAQcIeYBElgJpKglbMEyHQs";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- CORE UI FUNCTIONS ---
        function toggleForm() {
            const form = document.getElementById('formSection');
            form.classList.toggle('hidden');
            document.getElementById('toggleIcon').innerText = form.classList.contains('hidden') ? '+' : '-';
            if(!form.classList.contains('hidden')) {
                const now = new Date();
                document.getElementById('toa_display').value = now.toLocaleTimeString();
                document.getElementById('time_of_arrival').value = now.toISOString();
            }
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            const now = new Date();
            document.getElementById('start_time_display').value = now.toLocaleTimeString();
            document.getElementById('start_time_of_call').value = now.toISOString();
        });

        document.getElementById('endBtn').addEventListener('click', () => {
            const now = new Date();
            document.getElementById('end_time_display').value = now.toLocaleTimeString();
            document.getElementById('end_time_of_call').value = now.toISOString();
        });

        // --- DATA FETCHING ---
        async function loadGuarantors() {
            const select = document.getElementById('card_company_select');
            const { data, error } = await _supabase.from('hmo').select('guarantors').order('guarantors', { ascending: true });
            if (!error && data) {
                const unique = [...new Set(data.map(i => i.guarantors))].filter(Boolean);
                select.innerHTML = `<option value="">-- SELECT COMPANY --</option><option value="CASH">CASH</option>` + 
                                  unique.map(g => `<option value="${g}">${g}</option>`).join('');
            }
        }

        async function fetchRecords() {
            const { data, error } = await _supabase.from('hmo_monitoring').select('*').order('created_at', { ascending: false });
            if (!error) {
                renderTable(data);
                updateCharts(data);
            }
        }

        // --- RENDERING ---
        function renderTable(data) {
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = data.map(row => {
                const arrival = new Date(row.time_of_arrival);
                const start = row.start_time_of_call ? new Date(row.start_time_of_call).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--';
                const end = row.end_time_of_call ? new Date(row.end_time_of_call).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--';
                const status = row.turnaround_time || 'PENDING';
                
                let pillColor = 'text-slate-500 bg-slate-800 border-slate-700';
                if(status === 'MET') pillColor = 'text-emerald-400 bg-emerald-400/10 border-emerald-500/50';
                if(status === 'NOT MET') pillColor = 'text-red-400 bg-red-400/10 border-red-500/50';

                return `<tr class="border-b border-slate-800 hover:bg-white/5 transition">
                    <td class="p-4">
                        <div class="font-bold text-white">${row.patient_name}</div>
                        <div class="text-[9px] text-slate-400 uppercase">${row.patient_type} | ${row.card_company || 'CASH'}</div>
                    </td>
                    <td class="p-4 text-blue-400 font-semibold">${row.transaction_type}</td>
                    <td class="p-4 font-mono text-[10px] text-slate-400">${arrival.toLocaleTimeString()}</td>
                    <td class="p-4 text-[9px]"><div class="text-blue-400">S: ${start}</div><div class="text-emerald-400">E: ${end}</div></td>
                    <td class="p-4"><span class="status-pill border ${pillColor}">${status}</span></td>
                    <td class="p-4 text-slate-500 uppercase text-[10px]">${row.name_of_associate || '-'}</td>
                </tr>`;
            }).join('');
        }

        // --- CHARTS LOGIC ---
        function updateCharts(data) {
            // Patient Flow
            drawHigh('patientDonut', 'Patient Volume', [
                { name: 'NEW', y: data.filter(r => r.patient_type === 'New').length, color: '#6366f1' },
                { name: 'OLD', y: data.filter(r => r.patient_type === 'Old').length, color: '#10b981' }
            ], '70%');

            // SLA Status (Direct Column Map)
            drawHigh('slaPie', 'SLA Status', [
                { name: 'MET', y: data.filter(r => r.turnaround_time === 'MET').length, color: '#10b981' },
                { name: 'NOT MET', y: data.filter(r => r.turnaround_time === 'NOT MET').length, color: '#f43f5e' },
                { name: 'PENDING', y: data.filter(r => !r.turnaround_time || r.turnaround_time === 'PENDING').length, color: '#64748b' }
            ], '0%');
        }

        function drawHigh(id, title, data, innerSize) {
            Highcharts.chart(id, {
                chart: { type: 'pie', backgroundColor: 'transparent' },
                title: { text: title.toUpperCase(), style: { color: '#94a3b8', fontSize: '10px', fontWeight: '900', letterSpacing: '2px' } },
                credits: { enabled: false },
                plotOptions: {
                    pie: {
                        innerSize: innerSize,
                        borderWidth: 0,
                        dataLabels: { enabled: true, format: '{point.name}', style: { color: '#64748b', fontSize: '9px', textOutline: 'none' } }
                    }
                },
                series: [{ name: 'Total', data: data }]
            });
        }

        // --- FORM SUBMISSION ---
        document.getElementById('hmoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "SAVING..."; btn.disabled = true;

            const formData = new FormData(e.target);
            const entry = Object.fromEntries(formData.entries());
            
            const arrival = new Date(document.getElementById('time_of_arrival').value);
            const endCall = document.getElementById('end_time_of_call').value ? new Date(document.getElementById('end_time_of_call').value) : null;
            
            if (endCall) {
                const diffMins = Math.floor((endCall - arrival) / 60000);
                const limit = entry.transaction_type === 'Consult' ? 5 : 30;
                entry.turnaround_time = diffMins <= limit ? "MET" : "NOT MET";
            } else {
                entry.turnaround_time = "PENDING";
            }

            const { error } = await _supabase.from('hmo_monitoring').insert([entry]);
            if (error) alert(error.message);
            else {
                e.target.reset();
                toggleForm();
                fetchRecords();
            }
            btn.innerText = "SAVE PATIENT RECORD"; btn.disabled = false;
        });

        // Initialize
        loadGuarantors();
        fetchRecords();
        _supabase.channel('hmo_realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'hmo_monitoring' }, fetchRecords).subscribe();
    </script>
</body>
</html>
