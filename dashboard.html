<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMO Core | Command Center</title>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/drilldown.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #020202; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 2rem; }
        .associate-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 1px solid rgba(255,255,255,0.03); }
        .associate-btn:hover { background: rgba(99, 102, 241, 0.1); border-color: rgba(99, 102, 241, 0.3); transform: translateX(5px); }
        .associate-btn.active { background: #6366f1; border-color: #6366f1; color: #fff; box-shadow: 0 10px 20px -10px #6366f1; }
        .highcharts-figure { margin: 0; }
        .highcharts-breadcrumbs-button text { fill: #6366f1 !important; font-weight: bold !important; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-80 border-r border-white/5 p-8 flex flex-col gap-8 bg-black/50">
        <div>
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-[10px] font-black text-indigo-500 uppercase tracking-[0.4em]">Operations</h2>
                    <h3 class="text-xl font-black italic uppercase">Associates</h3>
                </div>
                <button onclick="filterByAssociate(null)" class="text-[9px] bg-white/5 hover:bg-white/10 px-3 py-1 rounded-full text-neutral-400 hover:text-white uppercase font-black transition">Reset</button>
            </div>
            <div id="associateList" class="space-y-3"></div>
        </div>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <header class="mb-12 flex justify-between items-end">
            <div>
                <h1 class="text-5xl font-black italic uppercase tracking-tighter">HMO <span class="text-indigo-600">Hub</span></h1>
                <p id="status" class="text-[10px] font-bold text-neutral-500 mt-2 uppercase tracking-[0.3em]">Connecting...</p>
            </div>
            <div id="filterTag" class="hidden glass px-6 py-2 border-indigo-500/30">
                <p class="text-[9px] font-black text-indigo-500 uppercase tracking-widest">Active Filter</p>
                <p id="currentFilterName" class="text-sm font-black uppercase italic">All Staff</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass p-8 border-l-4 border-indigo-600">
                <p class="text-[10px] font-black text-neutral-500 uppercase tracking-widest">Consultations</p>
                <h3 id="countConsult" class="text-6xl font-black mt-2 tabular-nums">--</h3>
            </div>
            <div class="glass p-8 border-l-4 border-emerald-600">
                <p class="text-[10px] font-black text-neutral-500 uppercase tracking-widest">LOA Issued</p>
                <h3 id="countLoa" class="text-6xl font-black mt-2 tabular-nums">--</h3>
            </div>
            <div class="glass p-8 border-l-4 border-purple-600">
                <p class="text-[10px] font-black text-neutral-500 uppercase tracking-widest">Procedures</p>
                <h3 id="countProcedure" class="text-6xl font-black mt-2 tabular-nums">--</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="glass p-10">
                <div id="patientDonutContainer"></div>
            </div>
            
            <div class="glass p-10">
                <div id="tatDrilldownContainer"></div>
            </div>
        </div>
    </main>

    <script>
        // CONFIGURATION
        const SUPABASE_URL = "https://zqnqkxpseeuyovtqezbc.supabase.co";
        // Correct Key restored below:
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxbnFreHBzZWV1eW92dHFlemJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTYyOTEsImV4cCI6MjA5MjM3MjI5MX0.uR9TcF4_J58cx7XsKx4BbAQcIeYBElgJpKglbMEyHQs";
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let cachedData = [];
        let selectedAssociate = null;

        async function syncData() {
            try {
                const { data, error } = await _supabase
                    .from('hmo_monitoring')
                    .select('transaction_type, name_of_associate, patient_type, turnaround_time');

                if (error) throw error;
                if (data) {
                    cachedData = data;
                    const statusEl = document.getElementById('status');
                    statusEl.innerText = `Live: ${cachedData.length} Records Synced`;
                    statusEl.classList.remove('text-red-500');
                    statusEl.classList.add('text-neutral-500');
                    updateSidebar();
                    applyLogic();
                }
            } catch (err) {
                console.error("Sync Error:", err.message);
                const statusEl = document.getElementById('status');
                statusEl.innerText = "Sync Failed: " + err.message;
                statusEl.classList.add('text-red-500');
            }
        }

        function updateSidebar() {
            const list = document.getElementById('associateList');
            const uniqueNames = [...new Set(cachedData.map(r => r.name_of_associate).filter(n => n))].sort();
            list.innerHTML = uniqueNames.map(name => `
                <div onclick="filterByAssociate('${name}')" 
                     class="associate-btn p-4 rounded-2xl flex justify-between items-center ${selectedAssociate === name ? 'active' : 'bg-white/5'}">
                    <span class="text-[11px] font-black uppercase tracking-tighter">${name}</span>
                    <span class="text-[9px] opacity-40 font-mono">${cachedData.filter(r => r.name_of_associate === name).length}</span>
                </div>
            `).join('');
        }

        function filterByAssociate(name) {
            selectedAssociate = name;
            const tag = document.getElementById('filterTag');
            if (name) {
                tag.classList.remove('hidden');
                document.getElementById('currentFilterName').innerText = name;
            } else {
                tag.classList.add('hidden');
            }
            updateSidebar();
            applyLogic();
        }

        function renderDonut(records) {
            const newP = records.filter(r => r.patient_type === 'New').length;
            const oldP = records.filter(r => r.patient_type === 'Old').length;
            const total = newP + oldP;

            Highcharts.chart('patientDonutContainer', {
                chart: { type: 'pie', backgroundColor: 'transparent', height: 400, events: {
                    render() {
                        const chart = this, series = chart.series[0];
                        let label = chart.options.chart.customLabel || (chart.options.chart.customLabel = chart.renderer.label('').css({color:'#fff', textAnchor:'middle'}).add());
                        label.attr({ text: `TOTAL<br><strong>${total}</strong>` });
                        const x = series.center[0] + chart.plotLeft, y = series.center[1] + chart.plotTop - (label.attr('height')/2);
                        label.attr({ x, y }).css({ fontSize: '14px' });
                    }
                }},
                title: { text: 'PATIENT FLOW', style: { color: '#6366f1', fontWeight: '900', fontSize: '10px', letterSpacing: '0.3em' } },
                plotOptions: { pie: { innerSize: '80%', borderRadius: 10, borderWidth: 0, dataLabels: { enabled: false } } },
                series: [{ name: 'Patients', data: [{name: 'NEW', y: newP, color:'#6366f1'}, {name: 'OLD', y: oldP, color:'#10b981'}] }],
                credits: { enabled: false }
            });
        }

        function renderTATDrilldown(records) {
            const brackets = {
                'Fast (<15m)': records.filter(r => r.turnaround_time <= 15),
                'Standard (15-30m)': records.filter(r => r.turnaround_time > 15 && r.turnaround_time <= 30),
                'Slow (>30m)': records.filter(r => r.turnaround_time > 30)
            };

            const mainData = Object.keys(brackets).map(key => ({
                name: key,
                y: brackets[key].length,
                drilldown: key
            }));

            const drilldownSeries = Object.keys(brackets).map(key => ({
                name: key,
                id: key,
                data: brackets[key].map(r => [`${r.turnaround_time} mins`, 1])
            }));

            Highcharts.chart('tatDrilldownContainer', {
                chart: { type: 'pie', backgroundColor: 'transparent', height: 400 },
                title: { text: 'TURNAROUND TIME (TAT)', style: { color: '#6366f1', fontWeight: '900', fontSize: '10px', letterSpacing: '0.3em' } },
                subtitle: { text: 'Click slices to view specific minute details', style: { color: '#666', fontSize: '9px' } },
                plotOptions: { pie: { shadow: false, center: ['50%', '50%'], borderRadius: 10, borderWidth: 0 } },
                tooltip: { valueSuffix: ' cases' },
                series: [{ name: 'Brackets', colorByPoint: true, data: mainData }],
                drilldown: { 
                    series: drilldownSeries,
                    activeDataLabelStyle: { color: '#fff', textDecoration: 'none' }
                },
                credits: { enabled: false }
            });
        }

        function applyLogic() {
            const displayData = selectedAssociate 
                ? cachedData.filter(r => r.name_of_associate === selectedAssociate)
                : cachedData;

            document.getElementById('countConsult').innerText = displayData.filter(r => r.transaction_type === 'Consult').length;
            document.getElementById('countLoa').innerText = displayData.filter(r => r.transaction_type === 'Loa').length;
            document.getElementById('countProcedure').innerText = displayData.filter(r => r.transaction_type === 'Procedure').length;

            renderDonut(displayData);
            renderTATDrilldown(displayData);
        }

        // INITIAL LOAD & REFRESH INTERVAL
        syncData();
        setInterval(syncData, 15000);
    </script>
</body>
</html>
