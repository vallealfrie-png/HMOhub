<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMO Core | Minimal Command</title>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #020202; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.05); border-radius: 1rem; }
        .associate-btn { transition: all 0.2s ease; cursor: pointer; border: 1px solid rgba(255,255,255,0.03); }
        .associate-btn:hover { background: rgba(99, 102, 241, 0.1); transform: translateX(2px); }
        .associate-btn.active { background: #6366f1; color: #fff; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-60 border-r border-white/5 p-4 flex flex-col gap-4 bg-black/50 overflow-y-auto">
        <div class="flex justify-between items-center">
            <h3 class="text-[10px] font-black uppercase tracking-widest text-indigo-500">Associates</h3>
            <button onclick="filterByAssociate(null)" class="text-[8px] bg-white/5 px-2 py-1 rounded text-neutral-400 uppercase font-bold">Reset</button>
        </div>
        <div id="associateList" class="space-y-1"></div>
    </aside>

    <main class="flex-1 p-6 flex flex-col gap-6 overflow-y-auto">
        <header class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black italic uppercase tracking-tighter">HMO <span class="text-indigo-600">Hub</span></h1>
                <p id="status" class="text-[8px] font-bold text-neutral-600 uppercase tracking-widest">Initial Sync...</p>
            </div>
            <div id="filterTag" class="hidden glass px-3 py-1 border-indigo-500/30">
                <p id="currentFilterName" class="text-[10px] font-black uppercase">All</p>
            </div>
        </header>

        <div class="grid grid-cols-3 gap-3">
            <div class="glass p-4 border-l-2 border-indigo-600">
                <p class="text-[8px] font-black text-neutral-500 uppercase">Consults</p>
                <h3 id="countConsult" class="text-3xl font-black tabular-nums">--</h3>
            </div>
            <div class="glass p-4 border-l-2 border-emerald-600">
                <p class="text-[8px] font-black text-neutral-500 uppercase">LOAs</p>
                <h3 id="countLoa" class="text-3xl font-black tabular-nums">--</h3>
            </div>
            <div class="glass p-4 border-l-2 border-purple-600">
                <p class="text-[8px] font-black text-neutral-500 uppercase">Procedures</p>
                <h3 id="countProcedure" class="text-3xl font-black tabular-nums">--</h3>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 flex-1">
            <div class="glass p-4 flex items-center justify-center">
                <div id="patientDonut" class="w-full h-full"></div>
            </div>
            <div class="glass p-4 flex items-center justify-center">
                <div id="slaPie" class="w-full h-full"></div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://zqnqkxpseeuyovtqezbc.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxbnFreHBzZWV1eW92dHFlemJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTYyOTEsImV4cCI6MjA5MjM3MjI5MX0.uR9TcF4_J58cx7XsKx4BbAQcIeYBElgJpKglbMEyHQs";
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let cachedData = [];
        let selectedAssociate = null;

        async function syncData() {
            try {
                const { data, error } = await _supabase
                    .from('hmo_monitoring')
                    .select('transaction_type, name_of_associate, patient_type, turnaround_time');
                if (error) throw error;
                if (data) {
                    cachedData = data;
                    document.getElementById('status').innerText = `${cachedData.length} Records Loaded`;
                    updateSidebar();
                    applyLogic();
                }
            } catch (err) {
                document.getElementById('status').innerText = "ERROR: " + err.message;
            }
        }

        function updateSidebar() {
            const list = document.getElementById('associateList');
            const uniqueNames = [...new Set(cachedData.map(r => r.name_of_associate).filter(n => n))].sort();
            list.innerHTML = uniqueNames.map(name => `
                <div onclick="filterByAssociate('${name}')" 
                     class="associate-btn px-3 py-2 rounded-lg flex justify-between items-center text-[10px] ${selectedAssociate === name ? 'active' : 'bg-white/5'}">
                    <span class="font-bold uppercase">${name}</span>
                    <span class="opacity-40 font-mono">${cachedData.filter(r => r.name_of_associate === name).length}</span>
                </div>
            `).join('');
        }

        function filterByAssociate(name) {
            selectedAssociate = name;
            const tag = document.getElementById('filterTag');
            if (name) {
                tag.classList.remove('hidden');
                document.getElementById('currentFilterName').innerText = name;
            } else {
                tag.classList.add('hidden');
            }
            updateSidebar();
            applyLogic();
        }

        function renderChart(id, type, title, data, isDonut) {
            Highcharts.chart(id, {
                chart: { type: 'pie', backgroundColor: 'transparent', height: 280 },
                title: { text: title, style: { color: '#6366f1', fontWeight: '900', fontSize: '10px' } },
                plotOptions: { 
                    pie: { 
                        innerSize: isDonut ? '70%' : '0%', 
                        borderWidth: 0, 
                        dataLabels: { 
                            enabled: true, 
                            format: '{point.name}: {point.y}', 
                            style: { color: '#aaa', fontSize: '8px', textOutline: 'none' } 
                        } 
                    } 
                },
                series: [{ name: 'Count', colorByPoint: true, data: data }],
                credits: { enabled: false }
            });
        }

        function applyLogic() {
            const displayData = selectedAssociate ? cachedData.filter(r => r.name_of_associate === selectedAssociate) : cachedData;

            document.getElementById('countConsult').innerText = displayData.filter(r => r.transaction_type === 'Consult').length;
            document.getElementById('countLoa').innerText = displayData.filter(r => r.transaction_type === 'Loa').length;
            document.getElementById('countProcedure').innerText = displayData.filter(r => r.transaction_type === 'Procedure').length;

            // Doughnut for Patient Flow
            renderChart('patientDonut', 'pie', 'PATIENT FLOW', [
                { name: 'NEW', y: displayData.filter(r => r.patient_type === 'New').length, color: '#6366f1' },
                { name: 'OLD', y: displayData.filter(r => r.patient_type === 'Old').length, color: '#10b981' }
            ], true);

            // Pie for SLA
            renderChart('slaPie', 'pie', 'SLA STATUS', [
                { name: 'MET', y: displayData.filter(r => r.turnaround_time <= 20).length, color: '#10b981' },
                { name: 'NOT MET', y: displayData.filter(r => r.turnaround_time > 20).length, color: '#ef4444' }
            ], false);
        }

        syncData();
    </script>
</body>
</html>
