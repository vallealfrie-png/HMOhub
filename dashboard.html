<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMO Intelligence | Minimal</title>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #010101; color: #e5e5e5; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.05); border-radius: 0.75rem; }
        .associate-btn { 
            width: 100%; padding: 8px; margin-bottom: 4px; background: #0a0a0a;
            border: 1px solid #1a1a1a; border-radius: 6px; color: #555;
            font-size: 9px; font-weight: 800; text-transform: uppercase;
            text-align: left; transition: all 0.3s ease;
        }
        .associate-btn:hover { color: #888; border-color: #333; }
        .associate-btn.active { color: #fff; border-color: #6366f1; background: #0c0c1e; border-left: 3px solid #6366f1; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #222; }
    </style>
</head>
<body class="flex h-screen">

    <aside class="w-48 border-r border-white/5 p-4 flex flex-col bg-[#050505] flex-shrink-0">
        <h3 class="text-[9px] font-black uppercase tracking-widest text-neutral-500 mb-4">Associates</h3>
        <div id="associateList" class="flex-grow overflow-y-auto pr-2"></div>
        <button onclick="filterByAssociate(null)" class="mt-4 text-[8px] bg-white/5 p-2 rounded text-neutral-400 uppercase font-bold hover:bg-white/10 transition-all">Reset Grid</button>
    </aside>

    <main class="flex-1 p-6 flex flex-col gap-4 overflow-y-auto">
        <header class="flex justify-between items-center mb-2">
            <div>
                <h1 class="text-xl font-black uppercase tracking-tighter text-white">
                    HMO Central <span class="text-indigo-500">Intelligence</span>
                </h1>
                <p id="status" class="text-[8px] font-bold text-neutral-600 uppercase tracking-widest">Link Stable</p>
            </div>
            <div id="filterTag" class="hidden glass px-3 py-1 border-indigo-500/30">
                <p id="currentFilterName" class="text-[9px] font-black uppercase text-indigo-500 tracking-widest">Global</p>
            </div>
        </header>

        <div class="grid grid-cols-3 gap-3">
            <div class="glass p-4 border-l-2 border-indigo-600">
                <p class="text-[8px] font-black text-neutral-500 uppercase tracking-widest">Consults</p>
                <h3 id="countConsult" class="text-3xl font-black tabular-nums">0</h3>
            </div>
            <div class="glass p-4 border-l-2 border-emerald-600">
                <p class="text-[8px] font-black text-neutral-500 uppercase tracking-widest">LOAs</p>
                <h3 id="countLoa" class="text-3xl font-black tabular-nums">0</h3>
            </div>
            <div class="glass p-4 border-l-2 border-rose-600">
                <p class="text-[8px] font-black text-neutral-500 uppercase tracking-widest">Procedures</p>
                <h3 id="countProcedure" class="text-3xl font-black tabular-nums">0</h3>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 flex-1 min-h-0">
            <div class="glass p-2">
                <div id="patientDonut" class="w-full h-full"></div>
            </div>
            <div class="glass p-2">
                <div id="slaPie" class="w-full h-full"></div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://zqnqkxpseeuyovtqezbc.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxbnFreHBzZWV1eW92tHFlemJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTYyOTEsImV4cCI6MjA5MjM3MjI5MX0.uR9TcF4_J58cx7XsKx4BbAQcIeYBElgJpKglbMEyHQs";
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let masterData = [];
        let selectedAssociate = null;

        async function sync() {
            const { data, error } = await _supabase
                .from('hmo_monitoring')
                .select('transaction_type, name_of_associate, patient_type, turnaround_time');
            
            if (data) {
                masterData = data;
                document.getElementById('status').innerText = `${masterData.length} Records Decrypted`;
                setupSidebar();
                render('all');
            }
        }

        function setupSidebar() {
            const list = document.getElementById('associateList');
            const names = [...new Set(masterData.map(r => r.name_of_associate).filter(n => n))].sort();
            list.innerHTML = names.map(name => `
                <button onclick="filterByAssociate('${name}', this)" class="associate-btn">
                    ${name}
                </button>
            `).join('');
        }

        function filterByAssociate(name, el) {
            selectedAssociate = name;
            document.querySelectorAll('.associate-btn').forEach(b => b.classList.remove('active'));
            if (el) el.classList.add('active');
            
            const tag = document.getElementById('filterTag');
            if (name) {
                tag.classList.remove('hidden');
                document.getElementById('currentFilterName').innerText = name;
            } else {
                tag.classList.add('hidden');
            }
            render(name || 'all');
        }

        function render(filter) {
            const data = filter === 'all' ? masterData : masterData.filter(r => r.name_of_associate === filter);
            
            document.getElementById('countConsult').innerText = data.filter(r => r.transaction_type === 'Consult').length;
            document.getElementById('countLoa').innerText = data.filter(r => r.transaction_type === 'Loa').length;
            document.getElementById('countProcedure').innerText = data.filter(r => r.transaction_type === 'Procedure').length;

            // Chart 1: Patient Flow (Donut)
            drawHigh('patientDonut', 'Patient Flow', [
                { name: 'NEW', y: data.filter(r => r.patient_type === 'New').length, color: '#6366f1' },
                { name: 'OLD', y: data.filter(r => r.patient_type === 'Old').length, color: '#10b981' }
            ], '70%');

            // Chart 2: SLA Status (Pie - Solid)
            const met = data.filter(r => r.turnaround_time <= 20).length;
            const notMet = data.filter(r => r.turnaround_time > 20).length;
            drawHigh('slaPie', 'SLA Status', [
                { name: 'MET', y: met, color: '#10b981' },
                { name: 'NOT MET', y: notMet, color: '#f43f5e' }
            ], '0%');
        }

        function drawHigh(id, title, data, innerSize) {
            Highcharts.chart(id, {
                chart: { type: 'pie', backgroundColor: 'transparent', height: 280 },
                title: { text: title.toUpperCase(), style: { color: '#FFFFFF', fontSize: '10px', fontWeight: '900', letterSpacing: '2px' } },
                credits: { enabled: false },
                tooltip: { enabled: true, backgroundColor: '#000', style: { color: '#fff' } },
                plotOptions: {
                    pie: {
                        innerSize: innerSize,
                        borderWidth: 0,
                        dataLabels: {
                            enabled: true,
                            format: '{point.name}',
                            distance: 15,
                            style: { color: '#666', fontSize: '8px', fontWeight: 'bold', textOutline: 'none' }
                        }
                    }
                },
                series: [{ name: 'Cases', colorByPoint: true, data: data }]
            });
        }

        sync();
    </script>
</body>
</html>
