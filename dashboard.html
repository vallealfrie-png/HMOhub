<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMO Hub | Command Center</title>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: white; overflow-x: hidden; }
        .sidebar { transition: all 0.3s ease; width: 260px; height: 100vh; position: fixed; left: 0; top: 0; z-index: 50; }
        .sidebar.collapsed { width: 0; transform: translateX(-100%); }
        .main-content { transition: all 0.3s ease; margin-left: 260px; }
        .main-content.expanded { margin-left: 0; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Skeleton Animation */
        .skeleton { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="font-sans">

    <aside id="sidebar" class="sidebar glass-card bg-slate-900 flex flex-col">
        <div class="p-6 border-b border-slate-800">
            <h2 class="text-xl font-bold text-blue-400">Team Roster</h2>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest">By Associate Name</p>
        </div>
        <div id="associateList" class="flex-1 overflow-y-auto p-4 space-y-2">
            <div class="skeleton h-12 w-full rounded-xl opacity-20"></div>
            <div class="skeleton h-12 w-full rounded-xl opacity-20"></div>
            <div class="skeleton h-12 w-full rounded-xl opacity-20"></div>
        </div>
        <div class="p-6 border-t border-slate-800">
            <a href="index.html" class="text-xs text-slate-400 hover:text-white flex items-center gap-2">← Back to Entry</a>
        </div>
    </aside>

    <main id="mainContent" class="main-content min-h-screen p-4 md:p-8">
        <nav class="flex items-center justify-between mb-8">
            <button onclick="toggleSidebar()" class="bg-slate-800 p-2 rounded-lg border border-slate-700">
                <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m7 6H4" stroke-width="2" stroke-linecap="round"></path></svg>
            </button>
            <div class="text-right">
                <h1 class="text-2xl font-black italic">COMMAND CENTER</h1>
                <p id="liveClock" class="text-emerald-400 font-mono text-sm"></p>
            </div>
        </nav>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-card p-6 rounded-2xl border-l-4 border-blue-500">
                <p class="text-slate-500 text-[10px] uppercase font-bold">Consults</p>
                <h3 id="countConsult" class="text-4xl font-black mt-1">--</h3>
            </div>
            <div class="glass-card p-6 rounded-2xl border-l-4 border-emerald-500">
                <p class="text-slate-500 text-[10px] uppercase font-bold">LOAs</p>
                <h3 id="countLoa" class="text-4xl font-black mt-1">--</h3>
            </div>
            <div class="glass-card p-6 rounded-2xl border-l-4 border-purple-500">
                <p class="text-slate-500 text-[10px] uppercase font-bold">Procedures</p>
                <h3 id="countProcedure" class="text-4xl font-black mt-1">--</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="lg:col-span-1 glass-card p-6 rounded-2xl">
                <div id="patientPieChart" style="height: 300px;">
                    <div class="flex items-center justify-center h-full">
                        <div class="skeleton w-40 h-40 rounded-full opacity-10"></div>
                    </div>
                </div>
            </div>
            <div class="lg:col-span-2 glass-card rounded-2xl overflow-hidden">
                <div class="p-4 bg-white/5 border-b border-white/10 text-xs font-bold uppercase tracking-widest text-slate-500">Live Traffic Logs</div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs">
                        <thead>
                            <tr class="bg-slate-900/50 text-slate-500">
                                <th class="p-4">Patient</th>
                                <th class="p-4">Type</th>
                                <th class="p-4">TAT</th>
                                <th class="p-4">Associate</th>
                            </tr>
                        </thead>
                        <tbody id="liveTableBody">
                            <tr><td colspan="4" class="p-4"><div class="skeleton h-4 w-full rounded opacity-10"></div></td></tr>
                            <tr><td colspan="4" class="p-4"><div class="skeleton h-4 w-full rounded opacity-10"></div></td></tr>
                            <tr><td colspan="4" class="p-4"><div class="skeleton h-4 w-full rounded opacity-10"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Exact copy from your working index.html
        const SUPABASE_URL = "https://zqnqkxpseeuyovtqezbc.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxbnFreHBzZWV1eW92tHFlemJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTYyOTEsImV4cCI6MjA5MjM3MjI5MX0.uR9TcF4_J58cx7XsKx4BbAQcIeYBElgJpKglbMEyHQs";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
            document.getElementById('mainContent').classList.toggle('expanded');
        }

        function updateClock() {
            document.getElementById('liveClock').innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchDashboardData() {
            // Using the exact logic from your index.html fetch
            const { data, error } = await _supabase.from('hmo_monitoring').select('*').order('created_at', { ascending: false });
            
            if (error) {
                console.error("Error loading data:", error);
                return;
            }
            if (data) renderDashboard(data);
        }

        function renderDashboard(records) {
            // 1. Scorecards
            document.getElementById('countConsult').innerText = records.filter(r => r.transaction_type === 'Consult').length;
            document.getElementById('countLoa').innerText = records.filter(r => r.transaction_type === 'Loa').length;
            document.getElementById('countProcedure').innerText = records.filter(r => r.transaction_type === 'Procedure').length;

            // 2. Sidebar Associates
            const associates = [...new Set(records.map(r => r.name_of_associate).filter(n => n))];
            document.getElementById('associateList').innerHTML = associates.map(name => `
                <div class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition cursor-pointer group">
                    <div class="w-8 h-8 rounded-lg bg-blue-600/20 flex items-center justify-center text-blue-400 font-bold text-xs">${name[0].toUpperCase()}</div>
                    <span class="text-sm font-medium text-slate-300 group-hover:text-white">${name}</span>
                </div>
            `).join('');

            // 3. Pie Chart
            const newCount = records.filter(r => r.patient_type === 'New').length;
            const oldCount = records.filter(r => r.patient_type === 'Old').length;

            Highcharts.chart('patientPieChart', {
                chart: { type: 'pie', backgroundColor: 'transparent' },
                title: { text: 'Patient Demographics', style: { color: '#64748b', fontSize: '12px', fontWeight: 'bold' } },
                plotOptions: {
                    pie: { innerSize: '70%', borderWidth: 0, dataLabels: { enabled: false }, showInLegend: true }
                },
                legend: { itemStyle: { color: '#94a3b8', fontSize: '10px' } },
                series: [{
                    name: 'Patients',
                    data: [
                        { name: 'New', y: newCount, color: '#3b82f6' },
                        { name: 'Old', y: oldCount, color: '#10b981' }
                    ]
                }]
            });

            // 4. Live Table
            const tbody = document.getElementById('liveTableBody');
            tbody.innerHTML = records.slice(0, 10).map(row => `
                <tr class="border-b border-white/5 hover:bg-white/5 transition">
                    <td class="p-4">
                        <div class="font-bold">${row.patient_name}</div>
                        <div class="text-[10px] text-slate-500">${row.card_company || 'CASH'}</div>
                    </td>
                    <td class="p-4 text-blue-400 font-medium">${row.transaction_type}</td>
                    <td class="p-4">
                        <span class="px-2 py-1 rounded border text-[10px] font-bold ${row.turnaround_time === 'MET' ? 'border-emerald-500/50 text-emerald-400' : 'border-red-500/50 text-red-400'}">
                            ${row.turnaround_time || 'PENDING'}
                        </span>
                    </td>
                    <td class="p-4 text-slate-400 uppercase font-mono">${row.name_of_associate || '-'}</td>
                </tr>
            `).join('');
        }

        // Real-time listener (Exact same setup as index.html)
        _supabase.channel('dashboard_v3').on('postgres_changes', { event: '*', schema: 'public', table: 'hmo_monitoring' }, fetchDashboardData).subscribe();
        
        // Initial Fetch
        fetchDashboardData();
    </script>
</body>
</html>
