<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMO Core | Minimalist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .skeleton { background: #111; animation: pulse 1.5s infinite; border-radius: 0.5rem; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 border-r border-white/5 p-6 flex flex-col gap-6">
        <div>
            <h2 class="text-[10px] font-black text-indigo-500 uppercase tracking-[0.3em] mb-6">Associates</h2>
            <div id="associateList" class="space-y-2">
                <div class="skeleton h-10 w-full"></div>
                <div class="skeleton h-10 w-full"></div>
            </div>
        </div>
    </aside>

    <main class="flex-1 p-10">
        <header class="mb-12">
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">Command <span class="text-indigo-600">Core</span></h1>
            <p id="status" class="text-[9px] font-bold text-neutral-500 mt-1 uppercase tracking-widest">Initialising Database...</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-8 border-l-4 border-indigo-600">
                <p class="text-[10px] font-black text-neutral-500 uppercase tracking-widest">Consultations</p>
                <h3 id="countConsult" class="text-6xl font-black mt-2">--</h3>
            </div>
            <div class="glass p-8 border-l-4 border-emerald-600">
                <p class="text-[10px] font-black text-neutral-500 uppercase tracking-widest">LOA Issued</p>
                <h3 id="countLoa" class="text-6xl font-black mt-2">--</h3>
            </div>
            <div class="glass p-8 border-l-4 border-purple-600">
                <p class="text-[10px] font-black text-neutral-500 uppercase tracking-widest">Procedures</p>
                <h3 id="countProcedure" class="text-6xl font-black mt-2">--</h3>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://zqnqkxpseeuyovtqezbc.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxbnFreHBzZWV1eW92dHFlemJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTYyOTEsImV4cCI6MjA5MjM3MjI5MX0.uR9TcF4_J58cx7XsKx4BbAQcIeYBElgJpKglbMEyHQs";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function syncCoreData() {
            try {
                const { data, error } = await _supabase
                    .from('hmo_monitoring')
                    .select('transaction_type, name_of_associate');

                if (error) throw error;

                if (data) {
                    // Update Status
                    document.getElementById('status').innerText = `Live: ${data.length} Records Synced`;
                    
                    // 1. Update Scorecards
                    document.getElementById('countConsult').innerText = data.filter(r => r.transaction_type === 'Consult').length;
                    document.getElementById('countLoa').innerText = data.filter(r => r.transaction_type === 'Loa').length;
                    document.getElementById('countProcedure').innerText = data.filter(r => r.transaction_type === 'Procedure').length;

                    // 2. Update Associate Sidebar
                    const uniqueAssociates = [...new Set(data.map(r => r.name_of_associate).filter(n => n))];
                    document.getElementById('associateList').innerHTML = uniqueAssociates.map(name => `
                        <div class="p-3 text-[11px] font-bold text-neutral-400 bg-white/5 rounded-xl border border-white/5 uppercase tracking-tighter">
                            ${name}
                        </div>
                    `).join('');
                }
            } catch (err) {
                document.getElementById('status').innerText = "Sync Failed: " + err.message;
                document.getElementById('status').classList.replace('text-neutral-500', 'text-red-500');
            }
        }

        // Run once
        syncCoreData();

        // Optional: Simple 10-second poll instead of buggy WebSockets for now
        setInterval(syncCoreData, 10000);
    </script>
</body>
</html>
