<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMO Hub | Command</title>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .skeleton { background: linear-gradient(90deg, #050505 25%, #111 50%, #050505 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Highcharts overrides */
        .highcharts-container { border-radius: 20px !important; }
        text { font-family: 'Inter', sans-serif !important; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-[1600px] mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-12">
            <div>
                <h1 class="text-5xl font-black tracking-tighter uppercase italic">
                    HMO <span class="text-indigo-600">Associate</span> Hub
                </h1>
                <p id="liveDate" class="text-[10px] font-bold text-neutral-500 tracking-[0.4em] uppercase mt-2">Connecting...</p>
            </div>
            <div class="flex gap-4">
                <div class="glass px-6 py-3 rounded-2xl border-l-4 border-indigo-600">
                    <p class="text-[9px] font-black text-neutral-500 uppercase tracking-widest">Active Records</p>
                    <p id="totalCount" class="text-2xl font-black">--</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="glass p-6 rounded-[2rem]">
                    <div id="chartContainer" class="h-[300px] w-full flex items-center justify-center">
                        <div class="skeleton w-40 h-40 rounded-full opacity-20"></div>
                    </div>
                </div>
                
                <div class="glass p-8 rounded-[2rem] border-t border-white/10">
                    <h4 class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-6">Service Mix</h4>
                    <div class="space-y-4" id="miniStats">
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-bold text-neutral-400">Consultations</span>
                            <span id="c1" class="font-black text-white italic">--</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-bold text-neutral-400">LOA Issued</span>
                            <span id="c2" class="font-black text-white italic">--</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-bold text-neutral-400">Procedures</span>
                            <span id="c3" class="font-black text-white italic">--</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="glass rounded-[2rem] overflow-hidden border border-white/5">
                    <div class="p-6 bg-white/5 flex justify-between items-center">
                        <h3 class="text-xs font-black tracking-widest uppercase text-neutral-400">Live Operations Feed</h3>
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-2 bg-indigo-500 rounded-full animate-ping"></div>
                            <span class="text-[9px] font-bold text-indigo-500">REAL-TIME SYNC</span>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-[10px] text-neutral-600 uppercase font-black border-b border-white/5">
                                    <th class="p-6">Patient Identification</th>
                                    <th class="p-6">Transaction</th>
                                    <th class="p-6">TAT Status</th>
                                    <th class="p-6">Associate</th>
                                </tr>
                            </thead>
                            <tbody id="mainTableBody">
                                <tr><td colspan="4" class="p-6"><div class="skeleton h-6 w-full rounded-lg opacity-5"></div></td></tr>
                                <tr><td colspan="4" class="p-6"><div class="skeleton h-6 w-full rounded-lg opacity-5"></div></td></tr>
                                <tr><td colspan="4" class="p-6"><div class="skeleton h-6 w-full rounded-lg opacity-5"></div></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://zqnqkxpseeuyovtqezbc.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxbnFreHBzZWV1eW92tHFlemJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTYyOTEsImV4cCI6MjA5MjM3MjI5MX0.uR9TcF4_J58cx7XsKx4BbAQcIeYBElgJpKglbMEyHQs";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function updateTime() {
            document.getElementById('liveDate').innerText = new Date().toLocaleString('en-US', { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', 
                hour: '2-digit', minute: '2-digit', second: '2-digit' 
            }).toUpperCase();
        }
        setInterval(updateTime, 1000);
        updateTime();

        // FAIL-SAFE DATA LOADER
        async function loadHMODashboard() {
            try {
                const { data, error } = await _supabase
                    .from('hmo_monitoring')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                if (data) {
                    refreshUI(data);
                }
            } catch (err) {
                console.error("Sync Error:", err.message);
            }
        }

        function refreshUI(records) {
            // 1. STATS
            document.getElementById('totalCount').innerText = records.length;
            document.getElementById('c1').innerText = records.filter(r => r.transaction_type === 'Consult').length;
            document.getElementById('c2').innerText = records.filter(r => r.transaction_type === 'Loa').length;
            document.getElementById('c3').innerText = records.filter(r => r.transaction_type === 'Procedure').length;

            // 2. TABLE
            const tbody = document.getElementById('mainTableBody');
            tbody.innerHTML = records.slice(0, 12).map(row => `
                <tr class="border-b border-white/[0.03] hover:bg-white/[0.02] transition-all">
                    <td class="p-6">
                        <div class="font-black text-sm text-indigo-100 italic">${row.patient_name}</div>
                        <div class="text-[9px] text-neutral-500 font-bold tracking-widest uppercase mt-1">${row.card_company || 'CASH'}</div>
                    </td>
                    <td class="p-6">
                        <div class="text-xs font-bold text-white">${row.transaction_type}</div>
                        <div class="text-[9px] text-neutral-600 font-mono">${row.patient_type}</div>
                    </td>
                    <td class="p-6">
                        <span class="px-3 py-1 rounded-full border text-[9px] font-black tracking-tighter ${
                            row.turnaround_time === 'MET' ? 'border-emerald-500/20 text-emerald-400 bg-emerald-500/5' : 'border-red-500/20 text-red-400 bg-red-500/5'
                        }">${row.turnaround_time || 'PENDING'}</span>
                    </td>
                    <td class="p-6">
                        <div class="text-[10px] font-black text-neutral-400 uppercase tracking-widest">${row.name_of_associate || '—'}</div>
                    </td>
                </tr>
            `).join('');

            // 3. CHART (Wrapped to prevent script death)
            try {
                const newP = records.filter(r => r.patient_type === 'New').length;
                const oldP = records.filter(r => r.patient_type === 'Old').length;

                Highcharts.chart('chartContainer', {
                    chart: { type: 'pie', backgroundColor: 'transparent', height: 300 },
                    title: { text: 'PATIENT MIX', style: { color: '#4f46e5', fontSize: '10px', fontWeight: '900', letterSpacing: '0.2em' } },
                    credits: { enabled: false },
                    plotOptions: {
                        pie: { innerSize: '80%', borderSize: 0, dataLabels: { enabled: false }, showInLegend: true }
                    },
                    legend: { itemStyle: { color: '#555', fontSize: '9px', fontWeight: 'bold' } },
                    series: [{
                        name: 'Total',
                        data: [
                            { name: 'NEW', y: newP, color: '#4f46e5' },
                            { name: 'OLD', y: oldP, color: '#10b981' }
                        ]
                    }]
                });
            } catch (cErr) { console.warn("Chart failed to render", cErr); }
        }

        // Realtime Subscription (matches your working index.html)
        _supabase.channel('dashboard_v2').on('postgres_changes', { event: '*', schema: 'public', table: 'hmo_monitoring' }, () => {
            loadHMODashboard();
        }).subscribe();

        // Initial Start
        loadHMODashboard();
    </script>
</body>
</html>
